          ※ 黄色背景=50%超え / 得点圏=2塁または3塁
        </div>
      </div>
      </div>
    `;
  }

  html += `<div style="margin-top:18px;padding-top:10px;border-top:1px solid #d1d5db;font-size:9px;color:#9ca3af;text-align:right">
    生成: ${new Date().toLocaleString('ja-JP')} ／ 配球アナリストPRO
  </div>`;

  container.innerHTML = html;
  document.body.appendChild(container);

  try {
    setProgress?.('レンダリング中…');
    const canvas = await window.html2canvas(container, {
      backgroundColor:'#ffffff', scale:2, useCORS:true, logging:false,
    });
    setProgress?.('PDF生成中…');
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const imgW = pdfW - margin*2;
    const imgH = canvas.height * imgW / canvas.width;
    const pageH = pdfH - margin*2;
    let heightLeft = imgH;
    let y = margin;
    pdf.addImage(imgData, 'JPEG', margin, y, imgW, imgH);
    heightLeft -= pageH;
    while(heightLeft > 0){
      y = margin - (imgH - heightLeft);
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', margin, y, imgW, imgH);
      heightLeft -= pageH;
    }
    const fname = `scouting_${(game.name||'game').replace(/[\\/:*?"<>|]/g,'_')}_${fmtDate}.pdf`;
    pdf.save(fname);
    setProgress?.('完了');
  } catch(err){
    console.error(err);
    alert('PDF生成エラー: '+err.message);
    setProgress?.('');
  } finally {
    document.body.removeChild(container);
  }
}

// ── CSV出力 ──
function exportCSV(game, pitches){
  const headers=['No.','時刻','回','表裏','打者','打席','投手','投手腕','カウントB','カウントS','アウト','ゾーン','球種','結果','打球方向','牽制'];
  const sorted=[...pitches].sort((a,b)=>a.timestamp-b.timestamp);
  const rows=sorted.map((p,i)=>{
    const pt=PT.find(x=>x.id===p.pt)?.label||'';
    const res=ALL_RESULTS.find(x=>x.id===p.result)?.label||p.result||'';
    const dir=FP[p.dir]?.l||'';
    const t=new Date(p.timestamp).toLocaleString('ja-JP');
    return [i+1,t,p.inning,p.topBottom==='top'?'表':'裏',p.batter,p.bh,p.pitcher,p.pitcherHand,
      p.balls,p.strikes,p.outs,p.zone||'',pt,res,dir,p.isPickoff?'牽制':''];
  });
  const csv=[headers,...rows].map(r=>r.map(v=>{
    const s=String(v??'');
    return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\n');
  // BOM付きでExcelで開ける
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${game.name||'game'}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// スカウティングサマリーをテキスト化（LINE共有用）
function buildShareText(game, pitches){
  const np=pitches.filter(p=>!p.isPickoff && !p.isAdvance);
  const {innings,maxInn}=computeLineScore(np);
  let aR=0,hR=0;
  for(let i=1;i<=maxInn;i++){aR+=innings[i]?.top.r||0;hR+=innings[i]?.bottom.r||0;}
  aR+=(game.gs?.scoreAdj?.away||0);
  hR+=(game.gs?.scoreAdj?.home||0);

  const lines=[];
  lines.push(` ${game.name||'試合'} ${game.date||''}`);
  if(game.stadium) lines.push(` ${game.stadium}`);
  lines.push(`${game.teamAway||'先攻'} ${aR} - ${hR} ${game.teamHome||'後攻'}`);
  // イニング別
  const line=[];
  for(let i=1;i<=maxInn;i++){
    line.push(`${i}:${innings[i]?.top.r??'-'}/${innings[i]?.bottom.r??'-'}`);
  }
  lines.push('回別 ' + line.join(' '));
  lines.push('');
  // 投手別
  const pNames=[...new Set(np.map(p=>p.pitcher).filter(Boolean))];
  pNames.forEach(pn=>{
    const mine=np.filter(p=>p.pitcher===pn);
    const t=mine.length;
    const s=mine.filter(p=>{return isStrikeResult(p.result);}).length;
    const so=mine.filter(p=>RESULT_CAT_MAP[p.result]==='so').length;
    const hit=mine.filter(p=>RESULT_CAT_MAP[p.result]==='hit').length;
    const bb=mine.filter(p=>RESULT_CAT_MAP[p.result]==='bb').length;
    const sp=mine.map(p=>p.speed).filter(x=>x>0);
    const max=sp.length?Math.max(...sp):0;
    lines.push(` 投手:${pn}`);
    lines.push(` ${t}球 S率${t>0?Math.round(s/t*100):0}% / 三振${so} 被安打${hit} 四死球${bb}` + (max?` / 最速${max}km`:''));
  });
  lines.push('');
  lines.push(' 配球アナリストPRO');
  return lines.join('\n');
}

// ── Share Screen ──
function ShareScreen({game,pitches,onBack}){
  const qrRef=useRef(null);
  const [pdfProgress,setPdfProgress]=useState('');
  const [shareMsg,setShareMsg]=useState('');
  useEffect(()=>{
    if(qrRef.current){
      qrRef.current.innerHTML='';
      try{new QRCode(qrRef.current,{text:window.location.href,width:160,height:160,
        colorDark:'#e2e8f0',colorLight:'#1e293b'});}
      catch(e){}
    }
  },[]);
  const exportPDF=async()=>{
    setPdfProgress('準備中…');
    await generateScoutingPDF(game, pitches, setPdfProgress);
    setTimeout(()=>setPdfProgress(''),1500);
  };
  // LINE 共有: テキストをLINEに送信（LINEアプリ起動）
  const shareLINE=()=>{
    const text=buildShareText(game,pitches);
    // LINE Share URL（ネイティブアプリがあれば起動）
    const url=`https://line.me/R/share?text=${encodeURIComponent(text)}`;
    window.open(url,'_blank');
    setShareMsg('LINEを起動しました');
    setTimeout(()=>setShareMsg(''),2000);
  };
  // Web Share API: モバイルOSの共有シート（LINE/メール/Slack/Twitter等）
  const shareWeb=async()=>{
    const text=buildShareText(game,pitches);
    if(navigator.share){
      try{
        await navigator.share({
          title:` ${game.name||'試合'}`,
          text,
        });
        setShareMsg('共有しました');
      }catch(e){
        if(e.name!=='AbortError') setShareMsg('共有失敗');
      }
    } else {
      // フォールバック: クリップボードコピー
      try{
        await navigator.clipboard.writeText(text);
        setShareMsg('クリップボードにコピー(共有シート非対応)');
      }catch(e){
        setShareMsg('コピー失敗');
      }
    }
    setTimeout(()=>setShareMsg(''),2000);
  };
  // 画像生成+共有: スカウティングレポート画像をLINE/共有シートで送信
  const shareImage=async()=>{
    if(!window.html2canvas){alert('html2canvas読み込み失敗');return;}
    setShareMsg('画像生成中…');
    // 簡易レポートDOMを作成
    const c=document.createElement('div');
    Object.assign(c.style,{position:'absolute',left:'-99999px',top:'0',
      width:'640px',background:'#0f172a',color:'#e2e8f0',padding:'20px',
      fontFamily:"-apple-system,'Hiragino Sans',sans-serif"});
    c.innerText=buildShareText(game,pitches);
    c.style.whiteSpace='pre-wrap';
    c.style.fontSize='15px';
    c.style.lineHeight='1.6';
    document.body.appendChild(c);
    try{
      const canvas=await window.html2canvas(c,{backgroundColor:'#0f172a',scale:2});
      canvas.toBlob(async(blob)=>{
        const file=new File([blob],`scout_${game.date||'game'}.png`,{type:'image/png'});
        if(navigator.canShare&&navigator.canShare({files:[file]})){
          try{
            await navigator.share({files:[file],title:` ${game.name||'試合'}`});
            setShareMsg('画像共有しました');
          }catch(e){
            if(e.name!=='AbortError') setShareMsg('共有失敗');
          }
        } else {
          // ファイル共有非対応→ダウンロード
          const a=document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download=`scout_${game.date||'game'}.png`;
          a.click();
          setShareMsg('画像ダウンロード(画像共有非対応端末)');
        }
        setTimeout(()=>setShareMsg(''),2500);
      });
    }finally{
      document.body.removeChild(c);
    }
  };
  return (
    <div className="screen">
      <div className="header">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← 戻る</button>
        <h2>共有・エクスポート</h2>
      </div>

      {/* LINE / Web 共有 */}
      <div className="card" style={{marginBottom:12,
        background:'#1e293b',border:'1px solid #334155'}}>
        <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}> LINE・SNS共有</span>
          <InfoBadge title="LINE共有について"
            body={'• LINEに送信: LINEアプリを起動してテキストを送る\n• 共有シート: iOS/Androidの共有メニューを開き、LINE・メール・Slack等から選択\n• 画像で共有: スカウト概要を画像化して送信（モバイル推奨）'}/>
        </div>
        <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>
          試合のスコア・投手成績の要約をLINE/SNSで送信
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
          <button className="btn"
            style={{padding:'10px',background:'#06c755',color:'#fff',fontWeight:700}}
            onClick={shareLINE}>
             LINEに送信
          </button>
          <button className="btn btn-primary" style={{padding:'10px'}}
            onClick={shareWeb}>
             共有シート
          </button>
        </div>
        <button className="btn btn-secondary" style={{width:'100%',padding:'8px'}}

        </button>
        {shareMsg&&(
          <div style={{marginTop:8,padding:'6px 10px',background:'rgba(59,130,246,.15)',
            borderRadius:6,fontSize:11,color:'#93c5fd',textAlign:'center'}}>

      {/* PDF スカウティングレポート */}
      <div className="card" style={{marginBottom:12,
        background:'#1e293b',border:'1px solid #334155'}}>

// ── 打者詳細パネル ──
function BatterDetailPanel({allPitches, batterName}){
  const stats=useMemo(()=>getBatterStats(allPitches,batterName),[allPitches,batterName]);
  if(stats.abs.length===0){
    return <div style={{textAlign:'center',color:'#475569',padding:20,fontSize:12}}>対象データなし</div>;
  }
  // 打席結果集計
  const abResults=useMemo(()=>{
    const r={ab:0, h:0, db:0, tr:0, hr:0, so:0, bb:0, hbp:0, sac:0, reached:0, outs:0};
    stats.abs.forEach(a=>{
      if(!a.result) return;
      r.ab++;
      if(a.result==='single') r.h++;
      else if(a.result==='double'){r.h++;r.db++;}
      else if(a.result==='triple'){r.h++;r.tr++;}
      else if(a.result==='hr'){r.h++;r.hr++;}
      else if(['looking','swinging'].includes(a.result)) r.so++;
      else if(a.result==='walk') r.bb++;
      else if(a.result==='hbp') r.hbp++;
      else if(['sac_bunt','sac_fly'].includes(a.result)) r.sac++;
      else if(['if_go_err','if_fly_err','of_fly_err','bunt_err'].includes(a.result)) r.reached++;
      else r.outs++;
    });
    // 公式打率算出: 安打/(打席-四死球-犠打犠飛)
    const atBats=r.ab-r.bb-r.hbp-r.sac;
    r.avg=atBats>0?r.h/atBats:0;
    r.atBats=atBats;
    return r;
  },[stats]);

  // 球種別 結果
  const ptResults=useMemo(()=>{
    const out={};
    PT.forEach(pt=>{
      const ps=stats.pitches.filter(p=>p.pt===pt.id);
      if(ps.length===0) return;
      out[pt.id]={
        total:ps.length,
        hit:ps.filter(p=>RESULT_CAT_MAP[p.result]==='hit').length,
        so:ps.filter(p=>p.result==='swinging'||p.result==='looking').length,
        whiff:ps.filter(p=>p.result==='swing'||p.result==='swinging').length,
        swing:ps.filter(p=>{
          const r=p.result;
          return r==='swing'||r==='swinging'||r==='foul'||
            ['hit','out','sac','reached'].includes(RESULT_CAT_MAP[p.result]);
        }).length,
      };
    });
    return out;
  },[stats]);

  // 対戦投手集計
  const vsPitchers=useMemo(()=>{
    const m={};
    stats.pitches.forEach(p=>{
      const name=p.pitcher;
      if(!name) return;
      if(!m[name]) m[name]={name,pitches:0,ab:0,h:0,so:0,bb:0};
      m[name].pitches++;
    });
    stats.abs.forEach(a=>{
      const pname=a.pitches[0]?.pitcher;
      if(!pname||!m[pname]||!a.result) return;
      m[pname].ab++;
      if(['single','double','triple','hr'].includes(a.result)) m[pname].h++;
      if(['looking','swinging'].includes(a.result)) m[pname].so++;
      if(['walk','hbp'].includes(a.result)) m[pname].bb++;
    });
    return Object.values(m).sort((a,b)=>b.pitches-a.pitches);
  },[stats]);

  return (
    <div>
      {/* 主要指標 */}
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>主要指標</span>
          <InfoBadge title="打者の主要指標"
            body={'• 打数=打席数-四死球-犠打犠飛\n• 打率=安打/打数\n• 出塁率の代わりに「打席数」「安打」を併記\n• 二/三/本=長打の内訳'}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,textAlign:'center'}}>
          {[
            {v:abResults.ab, l:'打席', c:'#e2e8f0'},
            {v:abResults.atBats,l:'打数', c:'#94a3b8'},
            {v:abResults.h, l:'安打', c:'#60a5fa'},
            {v:abResults.avg.toFixed(3).slice(1)||'.000',l:'打率',c:'#fbbf24'},
            {v:abResults.so, l:'三振', c:'#ef4444'},
            {v:abResults.bb+abResults.hbp,l:'四死球',c:'#f97316'},
            {v:abResults.hr, l:'本塁打',c:'#a78bfa'},
            {v:abResults.reached,l:'出塁(E)',c:'#14b8a6'},
          ].map(({v,l,c})=>(
            <div key={l} style={{padding:'5px 2px'}}>
              <div style={{fontSize:16,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
              <div style={{fontSize:9,color:'#64748b',marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ホット/コールドゾーン */}
      <div className="card" style={{marginBottom:10}}>

// ── Pitcher Detail Panel ──
// 投手個別の高度分析: 全打者/対左/対右フィルタ + 球種割合・コース・S率・安打後初球
// 投手サブセット（バンド別）の各種統計を一括計算
function computePitcherSubsetStats(allMine, handFilter){
  // handFilter: null=全打者, 'R'=対右, 'L'=対左
  const fp = handFilter==null ? allMine : allMine.filter(p=>p.bh===handFilter);
  const total = fp.length;
  const strikes = fp.filter(p=>{return isStrikeResult(p.result);}).length;
  const sRate = total>0?Math.round(strikes/total*100):0;
  const soC = fp.filter(p=>RESULT_CAT_MAP[p.result]==='so').length;
  const hitC = fp.filter(p=>RESULT_CAT_MAP[p.result]==='hit').length;
  const bbC = fp.filter(p=>RESULT_CAT_MAP[p.result]==='bb').length;
  const speeds = fp.map(p=>p.speed).filter(s=>s>0);
  const avgSpeed = speeds.length?Math.round(speeds.reduce((a,b)=>a+b,0)/speeds.length):null;
  const maxSpeed = speeds.length?Math.max(...speeds):null;

  const ptC = {};
  fp.forEach(p=>{if(p.pt) ptC[p.pt]=(ptC[p.pt]||0)+1;});
  const ptSR = {};
  fp.forEach(p=>{
    if(!p.pt) return;
    if(!ptSR[p.pt]) ptSR[p.pt]={t:0,k:0};
    ptSR[p.pt].t++;
    const cat=RESULT_CAT_MAP[p.result];
    if(cat==='strike'||cat==='so') ptSR[p.pt].k++;
  });

  // After-X 初球分析: 打席単位
  const sorted = [...allMine].sort((a,b)=>a.timestamp-b.timestamp);
  const abMap = {};
  sorted.forEach(p=>{if(!abMap[p.atBat])abMap[p.atBat]=[];abMap[p.atBat].push(p);});
  const abOrder = [...new Set(sorted.map(p=>p.atBat))];
  const afterST = {}, afterBK = {}, afterBB = {};
  PT.forEach(p=>{afterST[p.id]=0;afterBK[p.id]=0;afterBB[p.id]=0;});
  abOrder.forEach((abId, idx)=>{
    if(idx>=abOrder.length-1) return;
    const ab = abMap[abId]; if(!ab?.length) return;
    const last = ab[ab.length-1];
    if(!last) return;
    // ハンドフィルタは「前打席の打者」の手で判定
    if(handFilter&&last.bh!==handFilter) return;
    const nextFirst = abMap[abOrder[idx+1]]?.[0];
    if(!nextFirst?.pt) return;
    const cat = RESULT_CAT_MAP[last.result];
    if(cat==='hit'){
      // ストレート系=st/ts、それ以外は変化球
      if(last.pt==='st'||last.pt==='ts') afterST[nextFirst.pt]=(afterST[nextFirst.pt]||0)+1;
      else if(last.pt) afterBK[nextFirst.pt]=(afterBK[nextFirst.pt]||0)+1;
    } else if(cat==='bb'){
      afterBB[nextFirst.pt]=(afterBB[nextFirst.pt]||0)+1;
    }
  });
  const stTotal = Object.values(afterST).reduce((a,b)=>a+b,0);
  const bkTotal = Object.values(afterBK).reduce((a,b)=>a+b,0);
  const bbTotal = Object.values(afterBB).reduce((a,b)=>a+b,0);

  // カウント別球種割合: B-S毎の各球種の出現数
  const countPtMix = {};
  for(let b=0;b<=3;b++) for(let s=0;s<=2;s++) countPtMix[`${b}-${s}`]={t:0,pt:{}};
  fp.forEach(p=>{
    const k = `${p.balls||0}-${p.strikes||0}`;
    if(!p.pt||!countPtMix[k]) return;
    countPtMix[k].t++;
    countPtMix[k].pt[p.pt]=(countPtMix[k].pt[p.pt]||0)+1;
  });

  return {
    total, sRate, soC, hitC, bbC, avgSpeed, maxSpeed,
    ptC, ptSR, afterST, afterBK, afterBB, stTotal, bkTotal, bbTotal,
    countPtMix,
  };
}

// 走者状況分類
function classifyRunners(p){
  const r=p.runners||{};
  const f=!!r.first, s=!!r.second, t=!!r.third;
  if(!f&&!s&&!t) return 'none';
  if(f&&s&&t) return 'full';
  if(s||t) return 'scoring'; // 得点圏(2塁または3塁)
  return 'first'; // 1塁のみ
}
const RUNNER_GROUPS=[
  {k:'none', l:'走者なし'},
  {k:'first', l:'一塁'},
  {k:'scoring', l:'得点圏'},
  {k:'full', l:'満塁'},
];

function PitcherDetailPanel({allPitches, pitcherName}){
  const mine = useMemo(()=>
    allPitches.filter(p=>p.pitcher===pitcherName&&!p.isPickoff),
    [allPitches, pitcherName]
  );
  const all = useMemo(()=>computePitcherSubsetStats(mine, null), [mine]);
  const vsR = useMemo(()=>computePitcherSubsetStats(mine, 'R'), [mine]);
  const vsL = useMemo(()=>computePitcherSubsetStats(mine, 'L'), [mine]);

  // 走者状況別のサブセット
  const byRunner = useMemo(()=>{
    const g={};
    RUNNER_GROUPS.forEach(({k})=>{g[k]=mine.filter(p=>classifyRunners(p)===k);});
    return g;
  },[mine]);

  // 全コース合計（zoneC + maxZone）
  const zoneAll = useMemo(()=>{
    const c={};
    for(let i=1;i<=25;i++) c[i]=0;
    mine.forEach(p=>{if(p.zone) c[p.zone]=(c[p.zone]||0)+1;});
    return c;
  },[mine]);

  if(all.total===0){
    return <div style={{textAlign:'center',color:'#475569',padding:20,fontSize:12}}>対象データなし</div>;
  }

  // 共通: 3列ヘッダ行
  const headRow=(
    <tr style={{background:'#0f172a'}}>
      <th style={cellHead}></th>
      <th style={cellHead}>全打者</th>
      <th style={cellHead}>vs右</th>
      <th style={cellHead}>vs左</th>
    </tr>
  );

  // 3列値行（数値）
  const valueRow=(label, vAll, vR, vL, color='#e2e8f0', emphasize=false)=>(
    <tr key={label} style={{borderBottom:'1px solid #1e293b'}}>
      <td style={{...cellLabel}}>{label}</td>
      <td style={{...cellVal,color,fontWeight:emphasize?900:700}}>{vAll??'–'}</td>
      <td style={{...cellVal,color,fontWeight:emphasize?900:700}}>{vR??'–'}</td>
      <td style={{...cellVal,color,fontWeight:emphasize?900:700}}>{vL??'–'}</td>
    </tr>
  );

  // 主要指標
  const summaryCard=(
    <div className="card" style={{marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:'#94a3b8',marginBottom:6}}>主要指標</div>
      <table style={tableStyle}>
        <thead>{headRow}</thead>
        <tbody>
          {valueRow('総球数', all.total, vsR.total, vsL.total)}
          {valueRow('S率', `${all.sRate}%`, `${vsR.sRate}%`, `${vsL.sRate}%`, '#eab308', true)}
          {valueRow('三振', all.soC, vsR.soC, vsL.soC, '#ef4444')}
          {valueRow('安打', all.hitC, vsR.hitC, vsL.hitC, '#60a5fa')}
          {valueRow('四死球', all.bbC, vsR.bbC, vsL.bbC, '#f97316')}
          {valueRow('平均km/h',
            all.avgSpeed??'–', vsR.avgSpeed??'–', vsL.avgSpeed??'–', '#a78bfa')}
          {valueRow('最速km/h',
            all.maxSpeed??'–', vsR.maxSpeed??'–', vsL.maxSpeed??'–', '#c084fc')}
        </tbody>
      </table>
    </div>
  );

  // 球種行（％バー + 3列）
  const ptCompareCard=(title, getValue, formatPct=true, subtitle)=>{
    // getValue(stats, pt) => {pct, count}
    // 出現する球種を全集合で集める
    const ptIds = new Set();
    [all, vsR, vsL].forEach(s=>{
      PT.forEach(pt=>{
        const v=getValue(s, pt);
        if(v && v.count>0) ptIds.add(pt.id);
      });
    });
    const sortedPts = PT.filter(pt=>ptIds.has(pt.id))
      .sort((a,b)=>(getValue(all,b).count||0)-(getValue(all,a).count||0));
    if(sortedPts.length===0) return null;
    return (
      <div className="card" style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#94a3b8',marginBottom:6}}>{title}</div>
        {subtitle&&<div style={{fontSize:10,color:'#64748b',marginBottom:6}}>{subtitle}</div>}
        <table style={tableStyle}>
          <thead>{headRow}</thead>
          <tbody>
            {sortedPts.map(pt=>{
              const a=getValue(all, pt), r=getValue(vsR, pt), l=getValue(vsL, pt);
              // 偏り検出: vs右/vs左に20pt以上の差で強調
              const diff = Math.abs((r.pct||0) - (l.pct||0));
              const emphasize = diff >= 20;
              return (
                <tr key={pt.id} style={{borderBottom:'1px solid #1e293b'}}>
                  <td style={cellLabel}>
                    <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',
                      background:pt.color,marginRight:5,verticalAlign:'middle'}}/>

                      {pt.label}

                  <td style={{...cellVal,color:pt.color}}>
                    {formatPct?`${a.pct||0}%`:a.pct}
                    {a.count>0&&<span style={{fontSize:8,color:'#64748b',marginLeft:2}}>({a.count})</span>}
                  </td>
                  <td style={{...cellVal,color:pt.color,
                    background:emphasize&&(r.pct>l.pct)?'rgba(239,68,68,.08)':'transparent'}}>
                    {formatPct?`${r.pct||0}%`:r.pct}
                  </td>
                  <td style={{...cellVal,color:pt.color,
                    background:emphasize&&(l.pct>r.pct)?'rgba(239,68,68,.08)':'transparent'}}>
                    {formatPct?`${l.pct||0}%`:l.pct}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {sortedPts.some(pt=>{
          const r=getValue(vsR,pt),l=getValue(vsL,pt);
          return Math.abs((r.pct||0)-(l.pct||0))>=20;
        })&&(
          <div style={{fontSize:9,color:'#fca5a5',marginTop:4}}>
            ※ 赤背景=対右と対左で20pt以上の差（傾向あり）
          </div>
        )}
      </div>
    );
  };

  // ── データ取得関数 ──
  const getPtMix = (s, pt) => {
    const c = s.ptC[pt.id]||0;
    return {count:c, pct:s.total>0?Math.round(c/s.total*100):0};
  };
  const getPtSR = (s, pt) => {
    const r = s.ptSR[pt.id];
    if(!r||r.t===0) return {count:0, pct:0};
    return {count:r.t, pct:Math.round(r.k/r.t*100)};
  };
  const getAfterST = (s, pt) => {
    const c = s.afterST[pt.id]||0;
    return {count:c, pct:s.stTotal>0?Math.round(c/s.stTotal*100):0};
  };
  const getAfterBK = (s, pt) => {
    const c = s.afterBK[pt.id]||0;
    return {count:c, pct:s.bkTotal>0?Math.round(c/s.bkTotal*100):0};
  };
  const getAfterBB = (s, pt) => {
    const c = s.afterBB[pt.id]||0;
    return {count:c, pct:s.bbTotal>0?Math.round(c/s.bbTotal*100):0};
  };

  // カウント別球種割合（全打者ベース）
  const countOrder=['0-0','0-1','1-0','1-1','2-0','2-1','0-2','1-2','2-2','3-0','3-1','3-2'];

  const usedPtIds=PT.filter(p=>all.ptC[p.id]>0)

        <InfoBadge title="カウント別球種割合"
          body={'各カウント(B-S)ごとに、どの球種を何%投げたかの内訳。\n• 黄色背景=50%以上集中（読みやすい配球）\n• 表示は上位6球種・全打者2球以上のカウントのみ'}/>

                borderBottom:'1px solid #334155'}}>球数</th>
              {showPts.map(p=>(
                <th key={p.id} style={{padding:'4px 3px',textAlign:'right',color:p.color,
                  fontSize:10,fontWeight:700,borderBottom:'1px solid #334155'}}>

                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {activeCounts.length===0?(

// 球種別 MAX/平均 球速カード
function PitchSpeedCard({pitches}){
  const data=useMemo(()=>{
    const out={};
    PT.forEach(pt=>{
      const ps=pitches.filter(p=>p.pt===pt.id && p.speed>0);
      if(ps.length===0) return;
      const speeds=ps.map(p=>p.speed);
      out[pt.id]={
        avg:Math.round(speeds.reduce((a,b)=>a+b,0)/speeds.length),
        max:Math.max(...speeds),
        min:Math.min(...speeds),
        count:ps.length,
      };
    });
    return out;
  },[pitches]);
  const ptList=PT.filter(pt=>data[pt.id]).sort((a,b)=>(data[b.id].max||0)-(data[a.id].max||0));
  if(ptList.length===0){
    return (
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>球種別 球速</span>
          <InfoBadge title="球種別球速"
            body={'各球種ごとの球数・平均球速・最速球速を表示。\n球速を入力していない投球は集計対象外。\n試合終盤の球速低下は疲労兆候。'}/>
        </div>
        <div style={{fontSize:11,color:'#475569',textAlign:'center',padding:10}}>
          球速入力がありません
        </div>
      </div>
    );
  }
  // 最速の球種を見つけて強調
  const overallMax=Math.max(...ptList.map(pt=>data[pt.id].max));
  return (
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>球種別 球速</span>
        <InfoBadge title="球種別球速"
          body={'各球種ごとの球数・平均球速・最速球速を表示。\n• MAXが急に落ちる→疲労兆候\n• 平均が低い変化球→打者は見送り対応\n• 直球とのMAX差が小さい→打者は変化に対応しやすい'}/>
      </div>
      <table style={tableStyle}>
        <thead>
          <tr style={{background:'#0f172a'}}>
            <th style={cellHead}>球種</th>
            <th style={cellHead}>球数</th>
            <th style={cellHead}>平均</th>
            <th style={cellHead}>MAX</th>
          </tr>
        </thead>
        <tbody>
          {ptList.map(pt=>{
            const d=data[pt.id];
            const isFastest=d.max===overallMax;
            return (
              <tr key={pt.id} style={{borderBottom:'1px solid #1e293b'}}>
                <td style={cellLabel}>
                  <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',
                    background:pt.color,marginRight:5,verticalAlign:'middle'}}/>
                  <span style={{color:pt.color,fontSize:11,fontWeight:700,verticalAlign:'middle'}}>
                    {pt.label}
                  </span>
                </td>
                <td style={{...cellVal,color:'#94a3b8'}}>{d.count}</td>
                <td style={{...cellVal,color:'#a78bfa',fontWeight:700}}>
                  {d.avg}<span style={{fontSize:9,color:'#64748b'}}>km/h</span>
                </td>
                <td style={{...cellVal,color:isFastest?'#fbbf24':'#c084fc',fontWeight:800,
                  background:isFastest?'rgba(251,191,36,.08)':'transparent'}}>
                  {d.max}<span style={{fontSize:9,opacity:.7}}>km/h</span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{fontSize:9,color:'#64748b',marginTop:4}}>
        ※ 黄色背景=最速球種 / 球速未入力の投球は集計対象外
      </div>
    </div>
  );
}

// 走者状況別の球種割合カード
function RunnerSituationCard({pitches, groups}){
  // 各走者状況の球種カウント計算
  const data=useMemo(()=>{
    const result={};
    RUNNER_GROUPS.forEach(({k})=>{
      const arr=groups[k]||[];
      const ptC={};
      arr.forEach(p=>{if(p.pt)ptC[p.pt]=(ptC[p.pt]||0)+1;});
      result[k]={total:arr.length, ptC};
    });
    return result;
  },[groups]);

  // 5球以上ある走者状況のみ表示
  const activeGroups=RUNNER_GROUPS.filter(g=>data[g.k].total>=3);
  if(activeGroups.length===0){
    return (
      <div className="card" style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#94a3b8',marginBottom:6}}>
          走者状況別の球種割合
        </div>
        <div style={{fontSize:11,color:'#475569',textAlign:'center',padding:8}}>
          サンプル不足
        </div>
      </div>
    );
  }

  // 全状況で出現する球種を収集
  const ptIds=new Set();
  activeGroups.forEach(g=>{
    Object.entries(data[g.k].ptC).forEach(([id,c])=>{if(c>0)ptIds.add(id);});
  });
  const sortedPts=PT.filter(pt=>ptIds.has(pt.id))
    .sort((a,b)=>{
      // 全合計でソート
      const aT=activeGroups.reduce((s,g)=>s+(data[g.k].ptC[a.id]||0),0);
      const bT=activeGroups.reduce((s,g)=>s+(data[g.k].ptC[b.id]||0),0);
      return bT-aT;
    });

  return (
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>走者状況別の球種割合</span>
        <InfoBadge title="走者状況別の球種割合"
          body={'走者の出塁状況ごとに球種の選び方が変わる傾向を可視化。\n• 走者なし: リスクなしの配球\n• 一塁: 盗塁警戒の配球\n• 得点圏: 失点リスク高、勝負球\n• 満塁: 安全策\n\n極端な偏り(20pt差以上は赤背景)があれば打者は読みやすい。'}/>
      </div>
      <table style={tableStyle}>
        <thead>
          <tr style={{background:'#0f172a'}}>
            <th style={cellHead}></th>
            {activeGroups.map(g=>(
              <th key={g.k} style={cellHead}>{g.l}<br/>
                <span style={{fontSize:8,color:'#64748b',fontWeight:400}}>{data[g.k].total}球</span>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sortedPts.map(pt=>{
            // 値の最大最小を取得（偏り判定）
            const pcts=activeGroups.map(g=>{
              const c=data[g.k].ptC[pt.id]||0;
              return data[g.k].total>0?Math.round(c/data[g.k].total*100):0;
            });
            const max=Math.max(...pcts), min=Math.min(...pcts);
            const bigSpread=max-min>=20;
            return (
              <tr key={pt.id} style={{borderBottom:'1px solid #1e293b'}}>
                <td style={cellLabel}>
                  <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',
                    background:pt.color,marginRight:5,verticalAlign:'middle'}}/>
                  <span style={{color:pt.color,fontSize:11,fontWeight:700,verticalAlign:'middle'}}>
                    {pt.label}
                  </span>
                </td>
                {activeGroups.map((g,i)=>(
                  <td key={g.k} style={{...cellVal,color:pt.color,
                    background:bigSpread&&pcts[i]===max?'rgba(239,68,68,.1)':'transparent'}}>
                    {pcts[i]}%
                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{fontSize:9,color:'#64748b',marginTop:4}}>
        ※ 走者状況間で20pt以上の差は赤背景で強調 / 3球未満の状況は非表示
      </div>
    </div>
  );
}

// ゾーンの位置分類（キャッチャー視点の左/中/右）
function getZoneColumn(z){
  // ZONE_GRID 列番号: 0=最左 1=左 2=真中 3=右 4=最右
  const colMap={
    10:0,15:0,17:0,19:0,21:0,
    11:1, 1:1, 4:1, 7:1,22:1,
    12:2, 2:2, 5:2, 8:2,23:2,
    13:3, 3:3, 6:3, 9:3,24:3,
    14:4,16:4,18:4,20:4,25:4,
  };
  return colMap[z];
}
// 外/真中/内 判定（打者左右考慮）
function getCourseSide(zone, batterHand){
  const col=getZoneColumn(zone);
  if(col==null) return null;
  if(col===2) return 'middle';
  // R打者: キャッチャー視点の左(col 0,1)=内側(打者寄り)、右(col 3,4)=外側
  // L打者: 逆
  const isLeftHalf = col<=1;
  if(batterHand==='L'){
    return isLeftHalf ? 'outside' : 'inside';
  }
  return isLeftHalf ? 'inside' : 'outside';
}
// 高さ判定: 高め/真中/低め（ストライクゾーン基準）
function getCourseHeight(zone){
  // ZONE_GRID 行: 0=最高 1=高 2=中 3=低 4=最低
  const rowMap={
    10:0,11:0,12:0,13:0,14:0,
    15:1, 1:1, 2:1, 3:1,16:1,
    17:2, 4:2, 5:2, 6:2,18:2,
    19:3, 7:3, 8:3, 9:3,20:3,
    21:4,22:4,23:4,24:4,25:4,
  };
  const r=rowMap[zone];
  if(r==null) return null;
  if(r<=1) return 'high';
  if(r>=3) return 'low';
  return 'middle';
}

// コース割合（5×5 ヒートマップ + 外/内 集計）
function ZoneRatioCard({zoneC, total, pitches=[]}){
  const max=Math.max(...Object.values(zoneC),1);

  // 内/外集計（真ん中は除外。打者左右考慮）
  const sideStats=useMemo(()=>{
    const c={inside:0, outside:0};
    pitches.forEach(p=>{
      if(!p.zone) return;
      const s=getCourseSide(p.zone, p.bh||'R');
      if(s==='inside') c.inside++;
      else if(s==='outside') c.outside++;
    });
    const t=c.inside+c.outside;
    return {
      ...c, total:t,
      insidePct:t>0?Math.round(c.inside/t*100):0,
      outsidePct:t>0?Math.round(c.outside/t*100):0,
    };
  },[pitches]);

  const barRow=(label,segments)=>(
    <div style={{marginBottom:6}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,
        color:'#94a3b8',marginBottom:3}}>
        <span style={{fontWeight:700}}>{label}</span>
        <span>
          {segments.map((s,i)=>(
            <span key={i} style={{color:s.color,marginLeft:8,fontWeight:700}}>
              {s.label} {s.pct}%
            </span>
          ))}
        </span>
      </div>
      <div style={{display:'flex',height:14,borderRadius:4,overflow:'hidden',
        background:'#0f172a',border:'1px solid #334155'}}>
        {segments.map((s,i)=>(
          <div key={i} style={{width:`${s.pct}%`,height:'100%',background:s.color,
            display:'flex',alignItems:'center',justifyContent:'center',
            color:'#fff',fontSize:10,fontWeight:800,
            borderRight:i<segments.length-1?'1px solid rgba(0,0,0,.3)':'none'}}>
            {s.pct>=10?`${s.pct}%`:''}
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>コース割合(内/外・全{total}球)</span>
        <InfoBadge title="コース割合(内/外)"
          body={'打者視点での内コース・外コースの割合。\n真ん中(中央列)は集計から除外し、内外のみで比較。\n• 内角に集中→攻める投球\n• 外角に集中→慎重な投球\n• 打者の左右に応じて自動判定'}/>
      </div>

      {/* 内/外 集計バー（真ん中は除外） */}
      {sideStats.total>0?(
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}}>
            <span style={{color:'#ef4444',fontWeight:800}}>内 {sideStats.insidePct}%</span>
            <span style={{color:'#64748b',fontSize:10}}>{sideStats.total}球(内外のみ)</span>
            <span style={{color:'#3b82f6',fontWeight:800}}>外 {sideStats.outsidePct}%</span>
          </div>
          <div style={{display:'flex',height:22,borderRadius:6,overflow:'hidden',
            background:'#0f172a',border:'1px solid #334155',marginBottom:6}}>
            <div style={{width:`${sideStats.insidePct}%`,height:'100%',background:'#ef4444',
              display:'flex',alignItems:'center',justifyContent:'center',
              color:'#fff',fontSize:11,fontWeight:800}}>
              {sideStats.insidePct>=12?`内 ${sideStats.insidePct}%`:''}
            </div>
            <div style={{width:`${sideStats.outsidePct}%`,height:'100%',background:'#3b82f6',
              display:'flex',alignItems:'center',justifyContent:'center',
              color:'#fff',fontSize:11,fontWeight:800}}>
              {sideStats.outsidePct>=12?`外 ${sideStats.outsidePct}%`:''}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            <div style={{textAlign:'center',padding:'5px',background:'rgba(239,68,68,.1)',borderRadius:5,
              border:'1px solid rgba(239,68,68,.3)'}}>
              <div style={{fontSize:9,color:'#fca5a5'}}>内コース</div>
              <div style={{fontSize:15,fontWeight:900,color:'#ef4444'}}>{sideStats.inside}球</div>
            </div>
            <div style={{textAlign:'center',padding:'5px',background:'rgba(59,130,246,.1)',borderRadius:5,
              border:'1px solid rgba(59,130,246,.3)'}}>
              <div style={{fontSize:9,color:'#93c5fd'}}>外コース</div>
              <div style={{fontSize:15,fontWeight:900,color:'#3b82f6'}}>{sideStats.outside}球</div>
            </div>
          </div>
        </div>
      ):(
        <div style={{fontSize:11,color:'#475569',textAlign:'center',padding:8}}>
          内/外コースのデータなし
        </div>
      )}

      {/* 5×5 ヒートマップ */}
      <div style={{display:'flex',flexDirection:'column',gap:2,alignItems:'center',marginTop:6}}>
        {ZONE_GRID.map((row,ri)=>(
          <div key={ri} style={{display:'flex',gap:2}}>
            {row.map(z=>{
              const cnt=zoneC[z]||0;
              const heat=max>0?cnt/max:0;

              return (

                    <>
                      <div style={{fontSize:10,fontWeight:800,color:'#fff',lineHeight:1}}>{pct}%</div>
                      <div style={{fontSize:8,color:'rgba(255,255,255,.6)'}}>{cnt}球</div>
                    </>
                  ):(

                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

        太枠=ストライクゾーン / 内外は打者左右考慮（真ん中列は集計除外）
      </div>
    </div>
  );
}

function HittingDirectionCard({pitches, batterHand}){
  const stats=useMemo(()=>{
    const counts={pull:0, center:0, oppo:0};
    let total=0;
    pitches.forEach(p=>{
      if(p.isPickoff||p.isAdvance) return;
      const cat=RESULT_CAT_MAP[p.result];
      if(!(cat==='hit'||cat==='out'||cat==='sac'||cat==='reached')) return;
      const d=getHittingDirection(p.dir, batterHand||p.bh||'R');
      if(d){counts[d]++;total++;}
    });
    return {counts, total};
  },[pitches, batterHand]);
  const pct=(c)=>stats.total>0?Math.round(c/stats.total*100):0;
  if(stats.total===0){
    return (
      <div className="card" style={{marginBottom:10}}>

// ── 投手のイニング別球速推移カード ──
function InningSpeedCard({pitches}){
  const data=useMemo(()=>{
    const byInn={};
    pitches.forEach(p=>{
      if(p.isPickoff||p.isAdvance||!p.speed||p.speed<=0) return;
      const k=`${p.inning}-${p.topBottom}`;
      if(!byInn[k]) byInn[k]={inning:p.inning,tb:p.topBottom,speeds:[]};
      byInn[k].speeds.push(p.speed);
    });
    return Object.values(byInn)
      .sort((a,b)=>a.inning-b.inning||(a.tb==='top'?-1:1))
      .map(d=>({
        inning:d.inning,
        tb:d.tb,
        avg:Math.round(d.speeds.reduce((a,b)=>a+b,0)/d.speeds.length),
        max:Math.max(...d.speeds),
        count:d.speeds.length,
      }));
  },[pitches]);
  if(data.length===0){
    return (
      <div className="card" style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#94a3b8',marginBottom:6}}>イニング別 球速推移</div>
        <div style={{fontSize:11,color:'#475569',textAlign:'center',padding:8}}>
          球速入力がありません
        </div>
      </div>
    );
  }
  const overallMax=Math.max(...data.map(d=>d.max));
  const overallMin=Math.min(...data.map(d=>d.avg))-5;
  const range=overallMax-overallMin;
  const firstAvg=data[0].avg;
  const lastAvg=data[data.length-1].avg;
  const drop=firstAvg-lastAvg;
  return (
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>イニング別 球速推移</span>
        <InfoBadge title="球速推移"
          body={'各イニングの平均球速・最速を表示。\n試合終盤に下がる→疲労兆候\n• 序盤と終盤で5km以上低下: 要交代検討\n• 一定: スタミナ十分'}/>
      </div>
      {/* バー表示 */}
      <div style={{display:'flex',gap:3,alignItems:'flex-end',justifyContent:'space-around',
        padding:'5px 2px',background:'#0f172a',borderRadius:6,
        height:120,marginBottom:6,position:'relative'}}>
        {data.map((d,i)=>{
          const avgH=range>0?((d.avg-overallMin)/range)*100:50;
          const maxH=range>0?((d.max-overallMin)/range)*100:60;
          return (
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',
              alignItems:'center',justifyContent:'flex-end',gap:2,position:'relative',height:'100%'}}>
              <div style={{position:'absolute',top:-2,fontSize:8,color:'#c084fc',fontWeight:700}}>
                {d.max}
              </div>
              <div style={{width:'80%',background:'linear-gradient(180deg,#a78bfa,#7c3aed)',
                height:`${maxH}%`,borderRadius:'3px 3px 0 0',position:'relative',
                opacity:.3}}>
              </div>
              <div style={{width:'80%',background:'linear-gradient(180deg,#c084fc,#a78bfa)',
                height:`${avgH}%`,borderRadius:'3px 3px 0 0',marginTop:`-${maxH}%`,
                display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:2}}>
                <span style={{fontSize:9,color:'#fff',fontWeight:800}}>{d.avg}</span>
              </div>
              <div style={{fontSize:8,color:'#64748b',marginTop:2}}>
                {d.inning}{d.tb==='top'?'表':'裏'}
              </div>
            </div>
          );
        })}
      </div>
      {/* 凡例 + 傾向 */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10}}>
        <div style={{display:'flex',gap:8}}>
          <span style={{color:'#c084fc'}}>■ 平均</span>
          <span style={{color:'#a78bfa',opacity:.6}}>■ 最速</span>
        </div>
        {data.length>=2&&(
          <span style={{fontWeight:700,
            color:drop>=5?'#ef4444':drop>=2?'#f97316':drop<=-2?'#22c55e':'#94a3b8'}}>
            初回比 {drop>0?'-':'+'}{Math.abs(drop)}km/h
          </span>
        )}
      </div>
    </div>
  );
}

function PitcherTimelineCard({game, pitches}){
  const timeline=useMemo(()=>{
    // 投手交代を時系列で抽出: 各pitcherごとに最初の投球イニングを記録
    const pitcherInns={};
    [...pitches].sort((a,b)=>a.timestamp-b.timestamp).forEach(p=>{

          name:p.pitcher,
          team:p.topBottom==='top'?'home':'away', // 守備チーム

          firstTB:p.topBottom,
          lastInn:p.inning,
          lastTB:p.topBottom,
          pitches:0,
          firstTs:p.timestamp,

      pitcherInns[p.pitcher].pitches++;
      pitcherInns[p.pitcher].lastInn=p.inning;

// ── Analysis Filter Defaults ──
const DEFAULT_FILTERS={
  bh:'all', ph:'all', count:'all', outs:'all', inning:'all',
  pitcher:'all', batter:'all',
};
const COUNT_PRESET_LABELS={
  first:'初球(0-0)', '2strike':'2ストライク', '3ball':'3ボール',
  ahead:'ヒッターズC', behind:'ピッチャーズC', fullcount:'フルカウント',
};
const INNING_LABELS={early:'序盤(1-3回)', mid:'中盤(4-6回)', late:'終盤(7回〜)'};

function pitchMatchesFilters(p, f){
  if(f.bh!=='all' && p.bh!==f.bh) return false;
  if(f.ph!=='all' && p.pitcherHand!==f.ph) return false;
  if(f.outs!=='all' && String(p.outs??0)!==f.outs) return false;
  if(f.pitcher!=='all' && p.pitcher!==f.pitcher) return false;
  if(f.batter!=='all' && p.batter!==f.batter) return false;
  if(f.inning!=='all'){
    const i=p.inning||0;
    if(f.inning==='early' && !(i>=1 && i<=3)) return false;
    if(f.inning==='mid' && !(i>=4 && i<=6)) return false;
    if(f.inning==='late' && !(i>=7)) return false;
  }
  if(f.count!=='all'){
    const b=p.balls||0, s=p.strikes||0;
    if(f.count.startsWith('preset:')){
      const preset=f.count.slice(7);
      if(preset==='first' && !(b===0&&s===0)) return false;
      if(preset==='2strike' && !(s>=2)) return false;
      if(preset==='3ball' && !(b>=3)) return false;
      if(preset==='ahead' && !((b===2&&s===0)||(b===3&&s===0)||(b===3&&s===1))) return false;
      if(preset==='behind' && !((b===0&&s===2)||(b===1&&s===2))) return false;
      if(preset==='fullcount' && !(b===3&&s===2)) return false;
    } else {
      const [fb,fs]=f.count.split('-').map(Number);
      if(b!==fb||s!==fs) return false;
    }
  }
  return true;
}

// ── Analysis Screen ──
function AnalysisScreen({game,pitches,onBack}){

  // フィルター候補
  const pitcherList=useMemo(()=>[...new Set(nonPickoff.map(p=>p.pitcher).filter(Boolean))],[nonPickoff]);

  const resetFilters=()=>setFilters(DEFAULT_FILTERS);

  // 集計（filtered ベース）
  const total=filtered.length;

  const strikes=useMemo(()=>filtered.filter(p=>{const cat=RESULT_CAT_MAP[p.result];return cat==='strike'||cat==='so';}).length,[filtered]);
  const sRate=total>0?Math.round(strikes/total*100):0;
  const ptC=useMemo(()=>{const c={};PT.forEach(p=>{c[p.id]=filtered.filter(x=>x.pt===p.id).length;});return c;},[filtered]);
  const resC=useMemo(()=>{const c={};ALL_RESULTS.forEach(r=>{c[r.id]=filtered.filter(x=>x.result===r.id).length;});return c;},[filtered]);
  const zoneC=useMemo(()=>{const c={};for(let i=1;i<=25;i++)c[i]=0;filtered.forEach(p=>{if(p.zone)c[p.zone]=(c[p.zone]||0)+1;});return c;},[filtered]);
  const maxZ=Math.max(...Object.values(zoneC),1);
  const pitcherStats=useMemo(()=>{
    const s={};
    filtered.forEach(p=>{
      const name=p.pitcher||'（未記録）';
      if(!s[name]) s[name]={name,total:0,strikes:0,so:0,hits:0,bb:0,outs:0,balls:0};
      const cat=RESULT_CAT_MAP[p.result];
      s[name].total++;
      if(cat==='strike') s[name].strikes++;
      else if(cat==='so'){s[name].so++;s[name].strikes++;}
      else if(cat==='hit') s[name].hits++;
      else if(cat==='bb') s[name].bb++;
      else if(cat==='out'||cat==='sac') s[name].outs++;
      else if(cat==='ball') s[name].balls++;
    });
    return Object.values(s).sort((a,b)=>b.total-a.total);
  },[filtered]);

  // ① 打者統計サマリ
  const batterStatsList=useMemo(()=>{
    const m={};
    filtered.forEach(p=>{
      const name=p.batter||'（未記録）';
      if(!name||name==='（未記録）') return;
      if(!m[name]) m[name]={name,pitches:0,abIds:new Set(),hand:p.bh};
      m[name].pitches++;
      if(p.atBat) m[name].abIds.add(p.atBat);
    });
    // 各打席の最終結果を集計
    const arr=Object.values(m).map(b=>{
      const myPitches=filtered.filter(p=>p.batter===b.name);
      const abMap={};
      myPitches.sort((a,b)=>a.timestamp-b.timestamp).forEach(p=>{
        if(!abMap[p.atBat])abMap[p.atBat]=[];
        abMap[p.atBat].push(p);
      });
      const ABS=['walk','hbp','single','double','triple','hr','looking','swinging',
        'if_go','if_fly','of_fly','if_liner','of_liner','bunt_fly','safety_out',
        'sac_bunt','sac_fly','bat_int','def_int',
        'if_go_err','if_fly_err','of_fly_err','bunt_err',
        'dp_643','dp_463','dp_543','dp_163','dp_363','dp_liner','dp_so_steal','dp_other'];
      let abCount=0,hits=0,so=0,bb=0;
      Object.values(abMap).forEach(ab=>{
        const last=ab[ab.length-1];
        if(last && ABS.includes(last.result)){
          abCount++;
          if(['single','double','triple','hr'].includes(last.result)) hits++;
          if(['looking','swinging','dp_so_steal'].includes(last.result)) so++;
          if(['walk','hbp'].includes(last.result)) bb++;
        }
      });
      return {name:b.name,pitches:b.pitches,abCount,hits,so,bb,hand:b.hand};
    });
    return arr.sort((a,b)=>b.pitches-a.pitches);
  },[filtered]);

  const hasFilter=activeFilters.length>0;
  const emptyMsg=hasFilter?'フィルター条件に該当する投球なし':'記録なし';

  return (
    <div className="screen">
      <div className="header">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← 戻る</button>
        <h2>分析</h2>
        <span style={{fontSize:13,color:'#64748b'}}>
          {hasFilter?`${total}/${grandTotal}球`:`${total}球`}
        </span>
      </div>

      {/* フィルターバー */}
      <div style={{marginBottom:12,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        <button className="btn btn-sm" style={{
          background:hasFilter?'#3b82f6':'#334155',
          color:'#fff',padding:'6px 10px',fontSize:12,
        }} onClick={()=>setShowFilter(true)}>
           フィルター{hasFilter?` (${activeFilters.length})`:''}
        </button>
        {activeFilters.map(f=>(
          <span key={f.key} onClick={()=>clearOne(f.key)}
            style={{display:'inline-flex',alignItems:'center',gap:4,
              background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.4)',
              color:'#93c5fd',fontSize:11,padding:'3px 8px',borderRadius:12,cursor:'pointer',
              fontFamily:'inherit',userSelect:'none'}}>
            {f.label} <span style={{color:'#64748b'}}>✕</span>
          </span>
        ))}
        {hasFilter&&(
          <button onClick={resetFilters} style={{background:'transparent',border:'none',
            color:'#94a3b8',fontSize:11,cursor:'pointer',padding:'3px 6px',fontFamily:'inherit'}}>
            全解除
          </button>
        )}
      </div>

      <div className="tab-bar" style={{gap:4}}>
        {[
          ['pitchers','投手'],
          ['batters', '打者'],
          ['seq',     '配球'],
        ].map(([k,l])=>(
          <button key={k} className={`tab ${tab===k?'active':''}`}
            style={{fontSize:12,padding:'8px 2px',fontWeight:700}}
            onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {/* ── 不要タブのレガシーコード（タブ非表示で実行されない） ── */}
      {false&&tab==='overview'&&(
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>主要指標</span>
              <InfoBadge title="主要指標の見方"
                body={'• ストライク率=ストライクと判定された球の割合。50%以上が安定。\n• 総球数=対象期間の全投球数（牽制除く）。\n• ボール数=ボール判定の球数。多すぎる場合は制球が乱れている可能性。'}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
              <div><div style={{fontSize:26,fontWeight:800,color:'#ef4444'}}>{sRate}%</div><div style={{fontSize:11,color:'#64748b'}}>ストライク率</div></div>
              <div><div style={{fontSize:26,fontWeight:800}}>{total}</div><div style={{fontSize:11,color:'#64748b'}}>{hasFilter?'対象球数':'総投球数'}</div></div>
              <div><div style={{fontSize:26,fontWeight:800,color:'#22c55e'}}>{filtered.filter(p=>RESULT_CAT_MAP[p.result]==='ball').length}</div><div style={{fontSize:11,color:'#64748b'}}>ボール数</div></div>
            </div>
          </div>
          <div className="card">
            <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>球種分布</span>
              <InfoBadge title="球種分布"
                body={'対象期間でどの球種を何球投げたかの割合。\n上位2-3球種で全体の70%以上を占めるのが一般的な投手。配球が偏っていると打者に読まれやすい。'}/>
            </div>
            {PT.filter(p=>ptC[p.id]>0).sort((a,b)=>ptC[b.id]-ptC[a.id]).map(p=>(
              <div key={p.id} className="insight-row">
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <PitchDot ptId={p.id} size={14}/>
                  <span style={{fontSize:13}}>{p.label}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:72,height:6,background:'#0f172a',borderRadius:3,overflow:'hidden'}}>
                    <div style={{width:`${ptC[p.id]/total*100}%`,height:'100%',background:p.color}}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:p.color,minWidth:24,textAlign:'right'}}>{ptC[p.id]}</span>
                </div>
              </div>
            ))}
            {total===0&&<div style={{fontSize:12,color:'#475569',textAlign:'center',padding:16}}>{emptyMsg}</div>}
          </div>
        </div>
      )}
      {tab==='zone'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>コース分布（ヒートマップ 5×5）</span>
            <InfoBadge title="コース分布ヒートマップ"
              body={'5×5マスでどのコースに投げたかを集計。色が濃いほど投球数が多い。\n太枠内=ストライクゾーン(3×3)、外枠=ボールゾーン。\n• 外角・内角に偏る投手は対策が立てやすい\n• 真ん中(Z5)が多い投手はリスク高\n• 高め/低めに集中=狙いどころがはっきりしている'}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'center'}}>
            {ZONE_GRID.map((row,ri)=>(
              <div key={ri} style={{display:'flex',gap:3}}>
                {row.map(z=>{
                  const cnt=zoneC[z]||0;
                  const heat=maxZ>0?cnt/maxZ:0;
                  const isStrike=STRIKE_ZONES.has(z);
                  return (
                    <div key={z} style={{width:52,height:52,borderRadius:4,
                      border:isStrike?'2px solid #cbd5e1':'1px solid #334155',
                      background:`rgba(239,68,68,${heat*0.85+(isStrike?0.06:0.02)})`,
                      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                      <div style={{fontSize:9,color:'rgba(255,255,255,.5)'}}>{z}</div>
                      <div style={{fontSize:isStrike?18:13,fontWeight:800,color:'#fff'}}>{cnt||''}</div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:'#64748b',textAlign:'center',marginTop:6}}>太枠=ストライクゾーン</div>
        </div>
      )}
      {tab==='pitch'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>球種別詳細</span>
            <InfoBadge title="球種別S率の見方"
              body={'各球種ごとに投球数とストライク率を表示。\n• 直球S率が低い→制球難の可能性\n• 変化球のS率が極端に低い→打者は変化球を見送れば良い\n• 主力球種のS率が60%以上=信頼できる決め球'}/>
          </div>
          {PT.map(p=>{
            const cnt=ptC[p.id]; if(!cnt)return null;
            const ps=filtered.filter(x=>x.pt===p.id);
            const sk=ps.filter(x=>{return isStrikeResult(x.result);}).length;
            return (
              <div key={p.id} className="insight-row">
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <PitchDot ptId={p.id} size={14}/>
                  <span style={{fontSize:13}}>{p.label}</span>
                </div>
                <span style={{fontSize:12,color:'#94a3b8'}}>{cnt}球 / S率{cnt>0?Math.round(sk/cnt*100):0}%</span>
              </div>
            );
          })}
          {total===0&&<div style={{fontSize:12,color:'#475569',textAlign:'center',padding:16}}>{emptyMsg}</div>}
        </div>
      )}
      {tab==='result'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>結果別集計</span>
            <InfoBadge title="結果別集計"
              body={'19種類の投球結果（見逃し/空振り/ファール/単打/二塁打/凡打/三振等）の発生回数を一覧化。\n• 「ファール多い→粘られている」\n• 「内野ゴロが多い→ゴロ型投手」\n• 「外野フライ多い→フライ打球が増える時間帯あり」など'}/>
          </div>
          {ALL_RESULTS.filter(r=>resC[r.id]>0).map(r=>(
            <div key={r.id} className="insight-row">
              <span style={{fontSize:13}}>{r.label}</span>
              <span style={{fontSize:14,fontWeight:700}}>{resC[r.id]}</span>
            </div>
          ))}
          {total===0&&<div style={{fontSize:12,color:'#475569',textAlign:'center',padding:16}}>{emptyMsg}</div>}
        </div>
      )}
      {tab==='pitchers'&&(
        <div>
          {/* 追加候補④ 投手交代タイムライン */}
          <PitcherTimelineCard game={game} pitches={nonPickoff}/>
          <PitcherSelectableView pitcherStats={pitcherStats} filtered={filtered}
            hasFilter={hasFilter} emptyMsg={hasFilter?'フィルター条件に該当する投手データなし':'投手データなし（投球を記録すると集計されます）'}/>
        </div>
      )}

      {/* ① 打者分析タブ */}
      {tab==='batters'&&(
        <BatterSelectableView batterStatsList={batterStatsList} allPitches={filtered}
          emptyMsg={hasFilter?'フィルター条件に該当する打者データなし':'打者データなし（投球を記録すると集計されます）'}/>
      )}

      {/* ── イニング別ラインスコア ── */}
      {tab==='line'&&(
        <div>
          <div className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}> ラインスコア（投球履歴から自動計算）</span>
              <InfoBadge title="ラインスコア"
                body={'1回〜9回までのイニング別の得点(R)・安打(H)を表示。\n投球履歴から自動再生して計算しているので、手動で点を入れた場合と若干ズレることがあります(その時はスコア修正ボタンで補正)。\n下段の投球内訳でイニング毎の球数・S率・三振・四死球も確認できます。'}/>
            </div>
            <LineScore pitches={nonPickoff} game={game} gs={game.gs}/>
          </div>
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'#94a3b8',marginBottom:8}}>イニング別 投球内訳</div>
            {(()=>{
              const byInn={};
              nonPickoff.forEach(p=>{
                const k=`${p.inning}-${p.topBottom}`;
                if(!byInn[k]) byInn[k]={inning:p.inning,tb:p.topBottom,t:0,s:0,h:0,bb:0,so:0};
                byInn[k].t++;
                const cat=RESULT_CAT_MAP[p.result];
                if(cat==='strike'||cat==='so') byInn[k].s++;
                if(cat==='hit') byInn[k].h++;
                if(cat==='bb') byInn[k].bb++;
                if(cat==='so') byInn[k].so++;
              });
              const rows=Object.values(byInn).sort((a,b)=>a.inning-b.inning||(a.tb==='top'?-1:1));
              if(rows.length===0) return <div style={{fontSize:12,color:'#475569',textAlign:'center'}}>記録なし</div>;
              return rows.map((r,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',
                  fontSize:11,padding:'4px 0',borderBottom:'1px solid #0f172a'}}>
                  <span style={{color:'#94a3b8'}}>{r.inning}回{r.tb==='top'?'表':'裏'}</span>
                  <span style={{color:'#cbd5e1'}}>
                    {r.t}球 / S{r.t>0?Math.round(r.s/r.t*100):0}% / 安{r.h} 三{r.so} 四{r.bb}
                  </span>
                </div>
              ));
            })()}
          </div>
        </div>
      )}

      {/* ── カウント別ヒートマップ ── */}
      {tab==='count'&&(
        <div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:8,padding:'6px 10px',
            background:'#1e293b',borderRadius:6,display:'flex',alignItems:'center'}}>
            <span>カウント状況ごとのコース傾向を可視化。攻める/逃げるパターンが見えます。</span>
            <InfoBadge title="カウント別ヒートマップとは"
              body={'カウントごとに「どのコースに投げているか」を分解。\n• 初球(0-0): 試合の入り方が分かる\n• 2ストライク: 決め球コース\n• 3ボール: ストライクを取りに来るコース\n• ヒッターズC(2-0,3-0,3-1): 投手不利な時のコース\n• ピッチャーズC(0-2,1-2): 攻めの幅が見える'}/>
          </div>
          {total===0?(
            <div style={{textAlign:'center',color:'#475569',padding:20,fontSize:12}}>{emptyMsg}</div>
          ):(
            <CountHeatmap pitches={filtered}/>
          )}
        </div>
      )}

      {/* ── 配球シーケンス予測 ── */}
      {tab==='seq'&&(
        <div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:8,padding:'6px 10px',
            background:'#1e293b',borderRadius:6,display:'flex',alignItems:'center'}}>
            <span> 投手の球種パターン傾向。初球の選択・前球からの遷移確率を表示</span>
            <InfoBadge title="配球シーケンス予測"
              body={'初球の球種傾向と、ある球種の「次に何を投げるか」の確率を表示。\n例「直球後 → スライダー 65%」=直球の後はスライダーが65%の確率。\n• 投手の「決まったパターン」を発見できる\n• 打者は次の球種を予測しやすくなる\n• 6回以降に傾向が変わる投手もいる'}/>
          </div>
          {pitcherStats.length===0?(
            <div style={{textAlign:'center',color:'#475569',padding:20,fontSize:12}}>{emptyMsg}</div>
          ):(
            pitcherStats.map(ps=>(
              <div key={ps.name} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,
                  padding:'8px 12px',background:'rgba(168,85,247,.1)',borderRadius:10,
                  border:'1px solid rgba(168,85,247,.25)'}}>
                  <span style={{fontSize:18}}></span>
                  <span style={{fontSize:15,fontWeight:800,color:'#e2e8f0',flex:1}}>{ps.name}</span>
                  <span style={{fontSize:12,color:'#64748b'}}>{ps.total}球</span>
                </div>
                <PitchSequenceChart pitches={filtered} pitcherName={ps.name}/>
              </div>
            ))
          )}
        </div>
      )}

      {/* ── スプレーチャート ── */}
      {tab==='spray'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}> 打球分布（スプレーチャート）</span>
            <InfoBadge title="スプレーチャート"
              body={'打球を野手位置にプロット。\n• 引っ張り打ち中心？流し打ち中心？\n• 外野フライが特定方向に偏る打者は守備シフトの対象\n• 内野ゴロが多い投手はゴロ型、外野フライが多いとフライ型'}/>
          </div>
          {total===0?(
            <div style={{textAlign:'center',color:'#475569',padding:20,fontSize:12}}>{emptyMsg}</div>
          ):(
            <SprayChart pitches={filtered}/>
          )}
        </div>
      )}

      {showFilter&&(
        <FilterModal
          filters={filters}
          setFilters={setFilters}
          pitcherList={pitcherList}
          batterList={batterList}
          matchCount={total}
          totalCount={grandTotal}
          onClose={()=>setShowFilter(false)}
          onReset={resetFilters}
        />
      )}
    </div>
  );
}

// ── Filter Modal ──
function FilterModal({filters,setFilters,pitcherList,batterList,matchCount,totalCount,onClose,onReset}){
  const set=(k,v)=>setFilters(f=>({...f,[k]:v}));

  const chipStyle=(active)=>({
    padding:'6px 10px',borderRadius:7,
    border:`1px solid ${active?'#3b82f6':'#334155'}`,
    background:active?'#3b82f6':'transparent',
    color:active?'#fff':'#cbd5e1',
    fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',
    lineHeight:1.2,
  });

  const ChoiceRow=({label,value,options,onChange})=>(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>{label}</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
        {options.map(([k,l])=>(
          <button key={k} onClick={()=>onChange(k)} style={chipStyle(value===k)}>{l}</button>
        ))}
      </div>
    </div>
  );

  // 個別カウント (B0..3 × S0..2 = 12)
  const countGrid=[];
  for(let b=0;b<=3;b++) for(let s=0;s<=2;s++) countGrid.push(`${b}-${s}`);

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) onClose()}}>
      <div className="modal" style={{maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3 style={{fontSize:16}}> フィルター</h3>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>

        <div style={{fontSize:11,color:'#94a3b8',marginBottom:14,padding:'8px 10px',
          background:'rgba(59,130,246,.08)',borderRadius:6,textAlign:'center'}}>
          対象: <span style={{color:'#fff',fontWeight:800,fontSize:14}}>{matchCount}</span>
          <span style={{color:'#64748b'}}> / {totalCount} 球</span>
        </div>

        <ChoiceRow label="打者の左右" value={filters.bh}
          options={[['all','全て'],['R','右打者'],['L','左打者']]}
          onChange={v=>set('bh',v)}/>

        <ChoiceRow label="投手の左右" value={filters.ph}
          options={[['all','全て'],['R','右投手'],['L','左投手']]}
          onChange={v=>set('ph',v)}/>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>カウント（プリセット）</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {[
              ['all','全て'],
              ['preset:first','初球'],
              ['preset:2strike','2ストライク'],
              ['preset:3ball','3ボール'],
              ['preset:ahead','ヒッターズC'],
              ['preset:behind','ピッチャーズC'],
              ['preset:fullcount','フルカウント'],
            ].map(([k,l])=>(
              <button key={k} onClick={()=>set('count',k)} style={chipStyle(filters.count===k)}>{l}</button>
            ))}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',margin:'12px 0 6px'}}>カウント（個別 B-S）</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4}}>
            {countGrid.map(c=>(
              <button key={c} onClick={()=>set('count',c)} style={{...chipStyle(filters.count===c),padding:'7px 0',textAlign:'center',fontWeight:700}}>{c}</button>
            ))}
          </div>
        </div>

        <ChoiceRow label="アウトカウント" value={filters.outs}
          options={[['all','全て'],['0','0アウト'],['1','1アウト'],['2','2アウト']]}
          onChange={v=>set('outs',v)}/>

        <ChoiceRow label="イニング" value={filters.inning}
          options={[['all','全て'],['early','序盤(1-3)'],['mid','中盤(4-6)'],['late','終盤(7〜)']]}
          onChange={v=>set('inning',v)}/>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>投手</div>
          <select value={filters.pitcher} onChange={e=>set('pitcher',e.target.value)}>
            <option value="all">全ての投手</option>
            {pitcherList.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>打者</div>
          <select value={filters.batter} onChange={e=>set('batter',e.target.value)}>
            <option value="all">全ての打者</option>
            {batterList.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>

        <div style={{display:'flex',gap:8,marginTop:16,position:'sticky',bottom:0,
          background:'#1e293b',paddingTop:10}}>
          <button className="btn btn-secondary" style={{flex:1}} onClick={onReset}>リセット</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={onClose}>適用</button>
        </div>
      </div>
    </div>
  );
}

// ── History Screen ──
function HistoryScreen({pitches,onBack,onPitchEdit}){
  const [editPitch,setEditPitch]=useState(null);
  const [mode,setMode]=useState('chrono'); // 'chrono'(球順) | 'batter'(打者別)
  const sorted=[...pitches].sort((a,b)=>b.timestamp-a.timestamp);

  // ② 打者別グループ化: atBat単位で集約
  const atBatGroups=useMemo(()=>{
    const m={};
    [...pitches].sort((a,b)=>a.timestamp-b.timestamp).forEach(p=>{
      if(p.isPickoff) return;
      const k=p.atBat;
      if(!m[k]) m[k]={
        id:k,
        batter:p.batter||'-',
        bh:p.bh||'R',
        pitcher:p.pitcher||'',
        inning:p.inning,
        topBottom:p.topBottom,
        pitches:[],
        startTs:p.timestamp,
      };
      m[k].pitches.push(p);
    });
    // 打席結果(last pitch)を判定
    const ABS=['walk','hbp','single','double','triple','hr','looking','swinging',
      'if_go','if_fly','of_fly','if_liner','of_liner','bunt_fly','safety_out',
      'sac_bunt','sac_fly','bat_int','def_int',
      'if_go_err','if_fly_err','of_fly_err','bunt_err',
      'dp_643','dp_463','dp_543','dp_163','dp_363','dp_liner','dp_so_steal','dp_other'];
    Object.values(m).forEach(g=>{
      const last=g.pitches[g.pitches.length-1];
      if(last && ABS.includes(last.result)){
        g.result=last.result;
        g.dir=last.dir;
        g.hitType=last.hitType;
      }
    });
    // 新しい順
    return Object.values(m).sort((a,b)=>b.startTs-a.startTs);
  },[pitches]);

  return (
    <div className="screen">
      <div className="header">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← 戻る</button>
        <h2>投球履歴</h2>
        <span style={{fontSize:13,color:'#64748b'}}>{pitches.filter(p=>!p.isPickoff && !p.isAdvance).length}球</span>
      </div>

      {/* ② タブ切替 */}
      <div className="tab-bar" style={{marginBottom:10}}>
        <button className={`tab ${mode==='chrono'?'active':''}`}
          style={{fontSize:12,padding:'6px 4px',fontWeight:700}}
          onClick={()=>setMode('chrono')}> 球順</button>
        <button className={`tab ${mode==='batter'?'active':''}`}
          style={{fontSize:12,padding:'6px 4px',fontWeight:700}}
          onClick={()=>setMode('batter')}> 打者別 ({atBatGroups.length})</button>
      </div>

      {sorted.length===0&&<div style={{textAlign:'center',color:'#475569',marginTop:48,fontSize:15}}>投球記録がありません</div>}

      {/* 球順表示 */}
      {mode==='chrono'&&sorted.length>0&&(
        <div className="card">
          {sorted.map((p,i)=>{
            const ptInfo=p.pt?(PT.find(x=>x.id===p.pt)):null;
            const resInfo=ALL_RESULTS.find(x=>x.id===p.result);
            // 作戦/進塁イベント判定
            const isAdv=p.isAdvance;
            const opacity=p.isPickoff?0.65:(isAdv?0.75:1);
            const advLabels={steal:'盗塁',delayed:'ディレード',hitrun:'エンドラン',pb:'PB',wp:'WP',tag_out:'刺殺'};
            return (
              <div key={p.id} className="history-item" style={{opacity}}>
                <span style={{fontSize:12,color:'#475569',width:22,flexShrink:0,textAlign:'center'}}>{sorted.length-i}</span>
                {p.isPickoff
                  ? <span style={{fontSize:11,padding:'2px 6px',borderRadius:4,background:'rgba(59,130,246,.15)',color:'#60a5fa',fontWeight:700,flexShrink:0}}>牽</span>
                  : isAdv
                  ? <span style={{fontSize:11,padding:'2px 6px',borderRadius:4,background:'rgba(6,182,212,.18)',color:'#67e8f9',fontWeight:700,flexShrink:0}}>作</span>
                  : <PitchDot ptId={p.pt} size={18}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600}}>
                    {p.isPickoff?'牽制':isAdv?(advLabels[p.result]||p.result):ptInfo?.label||'-'}
                    {p.speed&&!isAdv&&<span style={{fontSize:10,color:'#c084fc',marginLeft:5}}>{p.speed}km/h</span>}
                  </div>
                  <div style={{fontSize:11,color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {p.inning}回{p.topBottom==='top'?'表':'裏'}
                    {!isAdv&&!p.isPickoff&&` / Z${p.zone||'-'} / ${resInfo?.label||p.result}`}
                    {p.dir&&!isAdv&&` / ${FP[p.dir]?.l||p.dir}`}
                    {p.hitType&&` / ${HIT_TYPE_LABELS[p.hitType]||p.hitType}`}
                    {p.pitcher&&` / 投:${p.pitcher}`}
                  </div>
                </div>
                {!p.isPickoff&&!isAdv&&onPitchEdit&&(
                  <button className="btn btn-secondary btn-sm"
                    style={{fontSize:10,padding:'3px 7px',flexShrink:0}}
                    onClick={()=>setEditPitch(p)}>修正</button>
                )}
                <span style={{fontSize:11,color:'#475569',flexShrink:0,minWidth:30,textAlign:'right'}}>{p.batter||''}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* ② 打者別表示 */}
      {mode==='batter'&&atBatGroups.length>0&&(
        <div>
          {atBatGroups.map((g,gi)=>{
            const resLabel=g.result?ALL_RESULTS.find(x=>x.id===g.result)?.label:'打席継続中';
            const resCat=g.result?RESULT_CAT_MAP[g.result]:null;
            const resColor=resCat==='hit'?'#60a5fa':
              resCat==='so'||resCat==='out'?'#ef4444':
              resCat==='bb'?'#f97316':
              resCat==='reached'?'#14b8a6':
              resCat==='sac'?'#a78bfa':'#94a3b8';
            return (
              <div key={g.id} className="card" style={{marginBottom:10,padding:'10px'}}>
                {/* ヘッダー: 回・打者・結果 */}
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,
                    background:'#0f172a',color:'#94a3b8',fontWeight:700}}>
                    #{atBatGroups.length-gi}
                  </span>
                  <span style={{fontSize:11,color:'#94a3b8'}}>
                    {g.inning}回{g.topBottom==='top'?'表':'裏'}
                  </span>
                  <span style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>
                    {g.batter}<span style={{fontSize:9,color:'#64748b',marginLeft:3}}>({g.bh}打)</span>
                  </span>
                  <span style={{flex:1}}/>
                  {g.pitcher&&<span style={{fontSize:10,color:'#64748b'}}>vs {g.pitcher}</span>}
                </div>
                {/* 結果 */}
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,
                  padding:'5px 8px',background:`${resColor}15`,borderRadius:6,
                  border:`1px solid ${resColor}40`}}>
                  <span style={{fontSize:11,color:'#94a3b8'}}>結果:</span>
                  <span style={{fontSize:14,fontWeight:800,color:resColor}}>{resLabel}</span>
                  {g.dir&&<span style={{fontSize:11,color:'#cbd5e1'}}>→{FP[g.dir]?.l||g.dir}</span>}
                  {g.hitType&&<span style={{fontSize:11,padding:'2px 6px',borderRadius:8,
                    background:'rgba(167,139,250,.15)',color:'#a78bfa'}}>
                    {HIT_TYPE_LABELS[g.hitType]}
                  </span>}
                  <span style={{flex:1}}/>
                  <span style={{fontSize:10,color:'#64748b'}}>{g.pitches.length}球</span>
                </div>
                {/* 配球シーケンス: ドット表示 */}
                <div style={{display:'flex',gap:3,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:10,color:'#64748b',marginRight:2}}>配球:</span>
                  {g.pitches.map((p,i)=>{
                    const pt=PT.find(x=>x.id===p.pt);
                    const cat=RESULT_CAT_MAP[p.result];
                    const ring=cat==='strike'||cat==='so'?'#eab308':
                      cat==='ball'?'#22c55e':
                      cat==='hit'?'#60a5fa':
                      cat==='out'?'#ef4444':'#94a3b8';
                    return (
                      <div key={p.id} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                        <div style={{fontSize:8,color:'#475569'}}>{i+1}</div>
                        <div style={{width:16,height:16,borderRadius:'50%',
                          background:pt?.color||'#64748b',
                          border:`2px solid ${ring}`,
                          display:'flex',alignItems:'center',justifyContent:'center'}}
                          title={`${pt?.label||'-'} / ${ALL_RESULTS.find(x=>x.id===p.result)?.label||p.result}${p.speed?' / '+p.speed+'km':''}`}/>
                        <div style={{fontSize:7,color:'#64748b'}}>{pt?.short?.slice(0,2)||'-'}</div>
                      </div>
                    );
                  })}
                </div>
                {/* 打席用ミニゾーンチャート */}
                <ZoneChart atBatPitches={g.pitches} batterHand={g.bh}/>
              </div>
            );
          })}
        </div>
      )}

      {editPitch&&(
        <PitchEditModal
          pitch={editPitch}
          onSave={async updated=>{
            if(onPitchEdit) await onPitchEdit(updated);
            setEditPitch(null);
          }}
          onClose={()=>setEditPitch(null)}
        />
      )}
    </div>
  );
}

// ── Substitution Modal ──
