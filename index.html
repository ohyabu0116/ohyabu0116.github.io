            onClick={()=>onConfirm({type,pitcher:newPitcher,targetOrder,player:newPlayer})}>
            確定
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Input Screen ──
function InputScreen({game,pitches,gs,setGs,onNav,refreshPitches,onGameUpdate}){
  const [step,setStep]=useState('zone');
  const [pZone,setPZone]=useState(null);
  const [pPt,setPPt]=useState(null);
  const [pResult,setPResult]=useState(null);
  // showScore は廃止（LineScoreの手動編集に統合）
  const [showTactics,setShowTactics]=useState(false); // 作戦ボタン展開
  const [showSub,setShowSub]=useState(false);
  const [showLineScore,setShowLineScore]=useState(false);
  const [inputMode,setInputMode]=useState('detail'); // 'detail' | 'quick'
  const [undoStack,setUndoStack]=useState([]);
  const touchX=useRef(null);

  // 攻撃チームに応じてlineupを切り替え（表=先攻Away, 裏=後攻Home）
  const lineup=useMemo(()=>{
    if(gs.topBottom==='top') return game.lineupAway||game.lineup||[];
    return game.lineupHome||game.lineup||[];
  },[game,gs.topBottom]);
  const activeBatter=useMemo(()=>{
    if(!lineup.length) return null;
    const o=gs.currentBatterOrder||1;
    return lineup.find(p=>p.order===o)||lineup[0];
  },[lineup,gs.currentBatterOrder]);
  const bh=activeBatter?.hand||'R';

  // 現打席の投球リスト（ZoneChart 表示用）
  const atBatPitches=useMemo(()=>
    pitches.filter(p=>p.atBat===gs.currentAtBat&&!p.isPickoff),
    [pitches,gs.currentAtBat]
  );
  // 守備側（現在投球している）投手: 表攻撃=後攻Homeが守備、裏=先攻Awayが守備
  const currentPitcher=useMemo(()=>
    gs.topBottom==='top'?game.pitcherHome:game.pitcherAway,
    [game,gs.topBottom]
  );

  const [currentSpeed,setCurrentSpeed]=useState('');
  const [inningSummary,setInningSummary]=useState(null);

  // 低レベル投球保存（zone/pt/result/dirを直接指定）
  const persistPitch=useCallback(async(zone,pt,result,dir=null,hitType=null)=>{
    const ns=nextState(result,gs);
    const speedNum=currentSpeed?parseInt(currentSpeed,10):null;
    // 進塁・刺殺・作戦イベントは投球扱いしない（球数加算しない・pt保存しない）
    const isAdvance = result==='steal'||result==='delayed'||result==='hitrun'||
                      result==='pb'||result==='wp'||result==='tag_out';
    const pitch={
      id:genId(),gid:game.id,
      pt:isAdvance?null:pt,
      zone:isAdvance?null:zone,
      result,dir,
      hitType:hitType||null, // ① 安打の打球タイプ
      speed:isAdvance?null:(isFinite(speedNum)?speedNum:null),
      batter:activeBatter?.name||'',bh,
      pitcher:currentPitcher?.name||'',pitcherNum:currentPitcher?.number||'',
      pitcherHand:currentPitcher?.hand||'R',
      pitcherArm:currentPitcher?.arm||null,
      pitcherPlate:currentPitcher?.plate||null,
      isPickoff:false,
      isAdvance, // 進塁イベントフラグ
      atBat:gs.currentAtBat,pab:gs.pitchCount,
      balls:gs.count.balls,strikes:gs.count.strikes,
      inning:gs.inning,topBottom:gs.topBottom,outs:gs.outs,
      runners:{
        first:!!gs.runners?.first,
        second:!!gs.runners?.second,
        third:!!gs.runners?.third,
      },
      timestamp:Date.now(),
    };
    await dbPut('pitches',pitch);
    const ac=lineup.length||9;
    const newGs={
      ...gs,...ns,
      // 進塁イベントは球数加算しない
      pitchCount:isAdvance?(gs.pitchCount||0):(gs.pitchCount||0)+1,
      scoreAdj:gs.scoreAdj||{home:0,away:0},
      currentAtBat:ns.atEnd?genId():gs.currentAtBat,
      currentBatterOrder:ns.atEnd?(((gs.currentBatterOrder||1)-1+1)%ac)+1:gs.currentBatterOrder,
    };
    setUndoStack(s=>[...s.slice(-49),{gs:{...gs},pitchId:pitch.id}]);
    setGs(newGs);
    await dbPut('games',{...game,gs:newGs});
    refreshPitches();
    // 作戦/進塁・刺殺イベントは投球扱いではないので入力状態をリセットしない
    if(!isAdvance){
      setPZone(null);setPPt(null);setPResult(null);setStep('zone');
      // ⑦ 球速も自動クリア（次の投球で新しい球速を入力するため）
      setCurrentSpeed('');
    }
    // イニング切替検知 → サマリー表示
    const innChanged = ns.atEnd && (gs.topBottom!==newGs.topBottom || gs.inning!==newGs.inning);
    if(innChanged){
      setInningSummary({
        inning: gs.inning,
        topBottom: gs.topBottom,
        endedAt: pitch.timestamp,
      });
    }
  },[gs,game,activeBatter,bh,currentPitcher,lineup,currentSpeed]);

  const submitPitch=useCallback((result,dir=null,hitType=null)=>{
    return persistPitch(pZone,pPt,result,dir,hitType);
  },[persistPitch,pZone,pPt]);

  // ① 安打+方向選択後の処理: HR以外はhitTypeステップへ
  const [pDir,setPDir]=useState(null);
  const handleDirSelected=useCallback((dir)=>{
    const cat=RESULT_CAT_MAP[pResult];
    // 安打 (HR以外) → 打球タイプ選択へ
    if(cat==='hit' && pResult!=='hr'){
      setPDir(dir);
      setStep('hitType');
    } else {
      submitPitch(pResult,dir);
    }
  },[pResult,submitPitch]);

  // ワンタップクイック入力（zone/ptが未選択ならデフォルト補完）
  const quickSubmit=useCallback((result)=>{
    const z=pZone||5; // デフォルト: ど真ん中
    const pt=pPt||'st'; // デフォルト: ストレート
    return persistPitch(z,pt,result,null);
  },[persistPitch,pZone,pPt]);

  // 音声コマンド処理
  const [voiceToast,setVoiceToast]=useState('');
  const handleVoice=useCallback((text)=>{
    const cmd=parseVoiceCommand(text);
    if(cmd.zone) setPZone(cmd.zone);
    if(cmd.pt) setPPt(cmd.pt);
    let msg=[];
    if(cmd.zone) msg.push(`Z${cmd.zone}`);
    if(cmd.pt) msg.push(PT.find(p=>p.id===cmd.pt)?.short||cmd.pt);
    if(cmd.result){
      const z=cmd.zone??pZone??5;
      const pt=cmd.pt??pPt??'st';
      // 2ストライク時の自動三振変換
      let r=cmd.result;
      if(r==='called'&&gs.count.strikes>=2) r='looking';
      else if(r==='swing'&&gs.count.strikes>=2) r='swinging';
      const resInfo=ALL_RESULTS.find(x=>x.id===r);
      const item=ALL_RESULTS.find(x=>x.id===r);
      const cat=RESULT_CAT_MAP[r];
      msg.push(resInfo?.label||r);
      // 打球方向必要な結果は確認画面へ（noDirは除く）
      if(NEEDS_DIR_CATS.has(cat) && !item?.noDir){
        setPZone(z);setPPt(pt);setPResult(r);setStep('detail');setInputMode('detail');
      } else {
        persistPitch(z,pt,r,null);
      }
    } else if(cmd.zone||cmd.pt){
      // 部分入力: 次のステップへ自動遷移
      if(cmd.pt) setStep('result');
      else if(cmd.zone) setStep('pt');
    } else {
      msg.push('未認識');
    }
    setVoiceToast(msg.join(' / '));
    setTimeout(()=>setVoiceToast(''),2000);
  },[persistPitch,pZone,pPt]);

  const undo=useCallback(async()=>{
    if(!undoStack.length)return;
    const last=undoStack[undoStack.length-1];
    setUndoStack(s=>s.slice(0,-1));
    await dbDel('pitches',last.pitchId);
    setGs(last.gs);
    await dbPut('games',{...game,gs:last.gs});
    refreshPitches();
    setPZone(null);setPPt(null);setPResult(null);setStep('zone');
  },[undoStack,gs,game]);

  const recordPickoff=useCallback(async()=>{
    const pitch={
      id:genId(),gid:game.id,pt:null,zone:null,result:'pickoff',dir:null,
      batter:activeBatter?.name||'',bh,
      pitcher:currentPitcher?.name||'',pitcherNum:currentPitcher?.number||'',
      pitcherHand:currentPitcher?.hand||'R',
      pitcherArm:currentPitcher?.arm||null,
      pitcherPlate:currentPitcher?.plate||null,
      isPickoff:true,
      atBat:gs.currentAtBat,pab:gs.pitchCount,
      balls:gs.count.balls,strikes:gs.count.strikes,
      inning:gs.inning,topBottom:gs.topBottom,outs:gs.outs,
      timestamp:Date.now(),
    };
    await dbPut('pitches',pitch);
    setUndoStack(s=>[...s.slice(-49),{gs:{...gs},pitchId:pitch.id}]);
    refreshPitches();
  },[gs,game,activeBatter,bh,currentPitcher]);

  const handleSubstitution=useCallback(async(sub)=>{
    let g={...game};
    const isTop=gs.topBottom==='top';
    if(sub.type==='pitcher'){
      // 守備側の投手を交代（表=後攻Home守備、裏=先攻Away守備）
      const key=isTop?'pitcherHome':'pitcherAway';
      g={...g,[key]:sub.pitcher};
    } else {
      // 攻撃側打順の選手を交代
      const lk=isTop?'lineupAway':'lineupHome';
      const lu=(g[lk]||[]).map(p=>
        p.order===sub.targetOrder?{...p,name:sub.player.name,number:sub.player.number,hand:sub.player.hand||p.hand,pos:sub.player.pos||p.pos}:p
      );
      g={...g,[lk]:lu};
    }
    const subRecord={...sub,id:genId(),inning:gs.inning,topBottom:gs.topBottom,timestamp:Date.now()};
    g={...g,subs:[...(g.subs||[]),subRecord]};
    await dbPut('games',g);
    onGameUpdate(g);
    setShowSub(false);
  },[game,gs,onGameUpdate]);

  // カウント・ランナーを手動変更（インタラクティブ修正）
  const updateGsManually=useCallback(async(newGs)=>{
    setGs(newGs);
    await dbPut('games',{...game,gs:newGs});
  },[game,setGs]);

  // ④ 打者ナビ: 前/次の打者へ移動（カウントとatBatもリセット）
  const navBatter=useCallback(async(dir)=>{
    const ac=lineup.length||9;
    const cur=gs.currentBatterOrder||1;
    let next=cur+dir;
    if(next<1) next=ac;
    if(next>ac) next=1;
    const newGs={
      ...gs,
      currentBatterOrder:next,
      currentAtBat:genId(),
      count:{balls:0,strikes:0},
    };
    setGs(newGs);
    await dbPut('games',{...game,gs:newGs});
  },[gs,game,lineup,setGs]);

  // ② 試合終了 / 再開
  const endGame=useCallback(async()=>{
    if(game.endedAt){
      // 終了取消(再開)
      if(!confirm('試合終了状態を解除して再開しますか？')) return;
      const g={...game,endedAt:null};
      await dbPut('games',g);
      onGameUpdate?.(g);
    } else {
      // 終了確定
      if(!confirm('試合を終了しますか？\n\n終了後も履歴/分析/PDF出力は引き続き可能です。')) return;
      const g={...game,endedAt:Date.now()};
      await dbPut('games',g);
      onGameUpdate?.(g);
    }
  },[game,onGameUpdate]);

  const awayScore=(gs.score.away||0)+(gs.scoreAdj?.away||0);
  const homeScore=(gs.score.home||0)+(gs.scoreAdj?.home||0);

  // ⑦ 左サイドバー用ナビボタン定義（打順は試合編集に統合済みのため除去）
  const navItems=[
    {key:'undo', icon:'↩', label:'取消', onClick:undo, disabled:!undoStack.length},
    {key:'line', icon:'', label:'ライン', onClick:()=>setShowLineScore(s=>!s), active:showLineScore},
    {key:'edit', icon:'', label:'編集', onClick:()=>onNav('edit')},
    {key:'hist', icon:'', label:'履歴', onClick:()=>onNav('history')},
    {key:'analy', icon:'', label:'分析', onClick:()=>onNav('analysis')},
    {key:'replay',icon:'', label:'再生', onClick:()=>onNav('replay')},
    {key:'share', icon:'', label:'共有', onClick:()=>onNav('share')},
  ];

  return (
    <div className="screen" style={{display:'flex',gap:5,paddingLeft:4,paddingRight:6,maxWidth:540}}
      onTouchStart={e=>{touchX.current=e.touches[0].clientX;}}
      onTouchEnd={e=>{if(touchX.current!==null&&e.changedTouches[0].clientX-touchX.current>80)undo();touchX.current=null;}}>

      {/* ⑦ 左サイドバー縦ナビ */}
      <div style={{display:'flex',flexDirection:'column',gap:3,
        width:50,flexShrink:0,padding:'2px',background:'#0c1322',borderRadius:8,
        border:'1px solid #1e293b',alignSelf:'flex-start',position:'sticky',top:4}}>
        {navItems.map(it=>(
          <button key={it.key} onClick={it.onClick} disabled={it.disabled}
            style={{
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              padding:'5px 0',borderRadius:6,
              border:`1px solid ${it.active?'#3b82f6':'transparent'}`,
              background:it.active?'rgba(59,130,246,.2)':'transparent',
              color:it.disabled?'#475569':(it.active?'#93c5fd':'#cbd5e1'),
              fontSize:9,fontWeight:700,
              cursor:it.disabled?'not-allowed':'pointer',
              fontFamily:'inherit',
              opacity:it.disabled?0.4:1,
              minHeight:0,lineHeight:1.1,
            }}>
            {it.icon&&<span style={{fontSize:14,marginBottom:1}}>{it.icon}</span>}
            <span style={{fontSize:10}}>{it.label}</span>
          </button>
        ))}
      </div>

      {/* メインコンテンツ */}
      <div style={{flex:1,minWidth:0}}>
      {/* Top bar - スマホ縦圧縮 */}
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:5}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>onNav('home')}>ホーム</button>
        <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',gap:6}}>
          <span style={{fontSize:17,fontWeight:800}}>{awayScore}</span>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'#64748b',lineHeight:1}}>{gs.inning}回</div>
            <div style={{fontSize:9,color:'#64748b',lineHeight:1}}>{gs.topBottom==='top'?'表':'裏'}</div>
          </div>
          <span style={{fontSize:17,fontWeight:800}}>{homeScore}</span>
        </div>
        <button onClick={endGame}
          style={{fontSize:10,padding:'4px 8px',borderRadius:5,
            border:`1px solid ${game.endedAt?'#22c55e':'#ef4444'}`,
            background:game.endedAt?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)',
            color:game.endedAt?'#4ade80':'#fca5a5',
            fontWeight:700,cursor:'pointer',fontFamily:'inherit',
            whiteSpace:'nowrap'}}>
          {game.endedAt?'再開':'試合終了'}
        </button>
      </div>

      {/* ② 試合終了済バナー */}
      {game.endedAt&&(
        <div style={{padding:'4px 8px',marginBottom:5,
          background:'rgba(34,197,94,.12)',borderRadius:6,
          border:'1px solid rgba(34,197,94,.35)',
          fontSize:10,color:'#86efac',textAlign:'center',fontWeight:700}}>
           試合終了済 ({new Date(game.endedAt).toLocaleString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})})
        </div>
      )}

      {/* State card - スマホ縦圧縮 */}
      <div className="card" style={{marginBottom:6,padding:'6px 8px'}}>
        <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'space-between'}}>
          <CountDisplay gs={gs} onGsChange={updateGsManually}/>
          <BaseDiamond runners={gs.runners} onRunnersChange={r=>updateGsManually({...gs,runners:r})}/>
          <div style={{textAlign:'center',minWidth:80}}>
            <div style={{fontSize:9,color:'#64748b',lineHeight:1,marginBottom:2}}>
              {gs.currentBatterOrder||1}番打者
            </div>
            <div style={{display:'flex',alignItems:'center',gap:3,justifyContent:'center'}}>
              <button onClick={()=>navBatter(-1)}
                style={{padding:'4px 6px',borderRadius:5,border:'1px solid #475569',
                  background:'#0f172a',color:'#94a3b8',fontSize:11,fontWeight:700,
                  cursor:'pointer',fontFamily:'inherit'}}
                title="前打者">←</button>
              <div style={{minWidth:50}}>
                <div style={{fontSize:13,fontWeight:700,lineHeight:1.1,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {activeBatter?.name||'-'}
                </div>
                <div style={{fontSize:9,color:'#94a3b8',lineHeight:1}}>{bh}打 #{activeBatter?.number||'-'}</div>
              </div>
              <button onClick={()=>navBatter(1)}
                style={{padding:'4px 6px',borderRadius:5,border:'1px solid #475569',
                  background:'#0f172a',color:'#94a3b8',fontSize:11,fontWeight:700,
                  cursor:'pointer',fontFamily:'inherit'}}
                title="次打者">→</button>
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:6,marginTop:5,alignItems:'center'}}>
          <span style={{fontSize:10,color:'#64748b'}}>総球: {gs.pitchCount||0}</span>
        </div>
      </div>

      {/* ── ラインスコア（折りたたみ・手動編集可）── */}
      {showLineScore&&(
        <div style={{marginBottom:8}}>
          <LineScore pitches={pitches} game={game} gs={gs} compact={true}
            editable={true}
            onSaveManual={async(manual)=>{
              const g={...game,lineScoreManual:manual};
              await dbPut('games',g);
              onGameUpdate?.(g);
            }}/>
        </div>
      )}

      {/* ── ライブダッシュボード ── */}
      <LiveDashboard pitches={pitches} currentPitcher={currentPitcher} gs={gs}/>


      {/* ── 入力モード切替 + 音声入力 - スマホ縦圧縮 ── */}
      {(
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:5}}>
          <div style={{display:'flex',background:'#0f172a',borderRadius:7,padding:2,gap:2,
            border:'1px solid #1e293b'}}>
            <button onClick={()=>setInputMode('detail')}
              style={{padding:'4px 10px',borderRadius:5,border:'none',cursor:'pointer',
                fontSize:11,fontWeight:800,fontFamily:'inherit',
                background:inputMode==='detail'?'#3b82f6':'transparent',
                color:inputMode==='detail'?'#fff':'#94a3b8'}}>
              詳細
            </button>
            <button onClick={()=>setInputMode('quick')}
              style={{padding:'4px 10px',borderRadius:5,border:'none',cursor:'pointer',
                fontSize:11,fontWeight:800,fontFamily:'inherit',
                background:inputMode==='quick'?'#3b82f6':'transparent',
                color:inputMode==='quick'?'#fff':'#94a3b8'}}>
              クイック
            </button>
          </div>
          <div style={{flex:1}}/>
          <VoiceInputButton onCommand={handleVoice} enabled={true}/>
        </div>
      )}

      {/* ── 球速エディタ: ゾーン選択後・球種選択ステップでのみ表示（結果ステップでは非表示で省スペース） ── */}
      {inputMode==='detail' && pZone && step==='pt' && (
        <SpeedEditor value={currentSpeed} onChange={setCurrentSpeed}/>
      )}

      {/* ── 入力モード本体 ── */}
      {inputMode==='quick'&&(
        <div>
          <QuickInputBar onQuickResult={quickSubmit} gs={gs}/>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <button className="btn btn-sm"
              style={{flex:1,fontSize:11,padding:'8px',background:'rgba(59,130,246,.15)',
                border:'1px solid #3b82f6',color:'#93c5fd',borderRadius:6,fontWeight:700}}
              onClick={recordPickoff}>
               牽制
            </button>
            <button className="btn btn-secondary btn-sm"
              style={{flex:1,fontSize:11,padding:'8px',fontWeight:700}}
              onClick={()=>setShowSub(true)}>
               選手交代
            </button>
            <button onClick={undo} className="btn"
              style={{flex:1,fontSize:11,padding:'8px',borderRadius:6,fontWeight:700,
                background:undoStack.length?'#7f1d1d':'#1e293b',
                border:undoStack.length?'1px solid #ef4444':'1px solid #334155',
                color:undoStack.length?'#fca5a5':'#475569',
                cursor:undoStack.length?'pointer':'not-allowed'}}
              disabled={!undoStack.length}>
              ↩ 1球戻す
            </button>
          </div>
          <div style={{fontSize:10,color:'#64748b',textAlign:'center',padding:'6px',
            background:'rgba(15,23,42,.5)',borderRadius:6,marginBottom:6}}>
            クイック入力: コース=中央(Z5)・球種=ストレートを既定値で記録。<br/>
            コースや球種を指定したい場合は <span style={{color:'#60a5fa',fontWeight:700}}> 詳細</span> モードへ
          </div>
        </div>
      )}

      {/* ── 詳細モード ── */}
      {inputMode==='detail'&&(<>
      {/* Step indicators - スマホ圧縮 */}
      <div style={{display:'flex',gap:2,marginBottom:5}}>
        {[['zone','①ゾーン'],['pt','②球種'],['result','③結果'],['detail','④打球']].map(([s,l])=>(
          <div key={s} style={{flex:1,padding:'2px 2px',borderRadius:5,textAlign:'center',fontSize:10,
            background:step===s?'#1d4ed8':'#1e293b',color:step===s?'#fff':'#475569',
            fontWeight:step===s?700:400}}>
            {l}
          </div>
        ))}
      </div>

      {/* Step: zone - スマホ縦圧縮 */}
      {step==='zone'&&(
        <div>
          <div className="card" style={{marginBottom:6,padding:'8px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>コース選択</span>
              <div style={{display:'flex',gap:4}}>
                {/* ① 作戦ボタン */}
                <button className="btn btn-sm"
                  style={{fontSize:10,padding:'3px 8px',background:showTactics?'rgba(6,182,212,.25)':'rgba(6,182,212,.12)',
                    border:'1px solid #06b6d4',color:'#67e8f9',borderRadius:5,fontWeight:700}}
                  onClick={()=>setShowTactics(s=>!s)}>
                  作戦 {showTactics?'▲':'▼'}
                </button>

                {currentPitcher.arm&&` / ${PITCHER_ARM_LABELS[currentPitcher.arm]||currentPitcher.arm}`}

            <span style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>② 球種（Z:{pZone}）</span>

              <button key={p.id}

                style={{padding:'10px 2px',borderRadius:7,border:`2px solid ${p.color}`,

        <DetailResultPicker
          pZone={pZone} pPt={pPt} gs={gs}
          onBack={()=>setStep('pt')}
          onSelect={(rid)=>{
            const item=ALL_RESULTS.find(x=>x.id===rid);
            const cat=RESULT_CAT_MAP[rid];
            if(NEEDS_DIR_CATS.has(cat) && !item?.noDir){
              setPResult(rid); setStep('detail');
            } else {
              submitPitch(rid);

          }}/>

      {/* Step: detail — 打球方向 or 確認 */}

        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>

              const cat=RESULT_CAT_MAP[pResult];
              if(cat==='hit' && pResult!=='hr'){
                setPDir(null);
                setStep('hitType');

                submitPitch(pResult,null);
              }

      )}

      {/* ① Step: hitType — 安打の打球タイプ */}
      {step==='hitType'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setStep('detail')}>← 戻る</button>

              ⑤ 打球タイプ —「{ALL_RESULTS.find(r=>r.id===pResult)?.label}」

          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
            {HIT_TYPES.map(ht=>(
              <button key={ht.v}

                  border:`2.5px solid ${ht.color}`,

                }}>

            ))}
          </div>

            onClick={()=>submitPitch(pResult,pDir,null)}>
            打球タイプ未指定で記録

        </div>
      )}
      {step==='detail'&&!NEEDS_DIR_CATS.has(RESULT_CAT_MAP[pResult])&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setStep('result')}>← 戻る</button>
            <span style={{fontSize:13,fontWeight:700,color:'#94a3b8'}}>④ 確認</span>
          </div>
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <div style={{fontSize:36,marginBottom:8}}></div>
            <div style={{fontSize:18,fontWeight:700,color:'#ef4444'}}>
              {ALL_RESULTS.find(r=>r.id===pResult)?.label}
            </div>
            <div style={{fontSize:13,color:'#64748b',marginTop:6}}>
              {PT.find(x=>x.id===pPt)?.label} / ゾーン:{pZone}
            </div>
          </div>
          <button className="btn btn-primary" style={{width:'100%'}}
            onClick={()=>submitPitch(pResult,null)}>記録する</button>
        </div>
      )}
      </>)}{/* end 詳細モード */}

      {showSub&&(
        <SubstitutionModal
          game={game} gs={gs}
          onConfirm={handleSubstitution}
          onClose={()=>setShowSub(false)}
        />
      )}
      {voiceToast&&(
        <div className="toast"> {voiceToast}</div>
      )}
      {inningSummary&&(
        <InningSummaryModal
          pitches={pitches}
          inning={inningSummary.inning}
          topBottom={inningSummary.topBottom}
          game={game}
          onClose={()=>setInningSummary(null)}/>
      )}
      </div>{/* end メインコンテンツ */}
    </div>
  );
}

// ── Replay Screen ──
function ReplayScreen({game, pitches, onBack}){
  const sorted=useMemo(()=>[...pitches].sort((a,b)=>a.timestamp-b.timestamp),[pitches]);
  const [idx,setIdx]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [speed,setSpeed]=useState(1500); // ms per pitch
  useEffect(()=>{
    if(!playing) return;
    if(idx>=sorted.length-1){setPlaying(false);return;}
    const t=setTimeout(()=>setIdx(i=>Math.min(sorted.length-1,i+1)),speed);
    return()=>clearTimeout(t);
  },[playing,idx,sorted.length,speed]);

  // 現在の投球までの再生状態
  const replayState=useMemo(()=>{
    let state={
      count:{balls:0,strikes:0},outs:0,
      runners:{first:false,second:false,third:false},
      score:{home:0,away:0},inning:1,topBottom:'top'
    };
    const upToHere=sorted.slice(0,idx+1).filter(p=>!p.isPickoff);
    upToHere.forEach(p=>{
      const ns=nextState(p.result,state);
      state={...state,...ns};
    });
    return state;
  },[sorted,idx]);
  const cur=sorted[idx];
  const atBatPs=cur?sorted.filter(p=>p.atBat===cur.atBat&&p.timestamp<=cur.timestamp&&!p.isPickoff):[];

  if(sorted.length===0){
    return (
      <div className="screen">
        <div className="header">
          <button className="btn btn-secondary btn-sm" onClick={onBack}>← 戻る</button>
          <h2>リプレイ</h2>
        </div>
        <div style={{textAlign:'center',color:'#475569',marginTop:48,fontSize:15}}>
          記録された投球がありません
        </div>
      </div>
    );
  }
  const ptInfo=PT.find(x=>x.id===cur.pt);
  const resInfo=ALL_RESULTS.find(x=>x.id===cur.result);
  return (
    <div className="screen">
      <div className="header">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← 戻る</button>
        <h2> リプレイ</h2>
        <span style={{fontSize:12,color:'#64748b'}}>{idx+1} / {sorted.length}</span>
      </div>

      {/* 状態表示 */}
      <div className="card" style={{marginBottom:8,padding:'10px 12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:13}}>
            <span style={{color:'#f97316',fontWeight:700}}>{replayState.score.away}</span>
            <span style={{color:'#64748b',margin:'0 6px'}}>{replayState.inning}回{replayState.topBottom==='top'?'表':'裏'}</span>
            <span style={{color:'#3b82f6',fontWeight:700}}>{replayState.score.home}</span>
          </div>
          <CountDisplay gs={replayState}/>
          <BaseDiamond runners={replayState.runners}/>
        </div>
        <div style={{fontSize:11,color:'#94a3b8',marginTop:6}}>
          {cur.batter?`打者:${cur.batter}(${cur.bh}打)`:''} {cur.pitcher?` / 投手:${cur.pitcher}`:''}
        </div>
      </div>

      {/* 投球詳細 */}
      <div className="card" style={{marginBottom:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          {cur.isPickoff?
            <span style={{fontSize:14,padding:'3px 10px',borderRadius:6,
              background:'rgba(59,130,246,.2)',color:'#60a5fa',fontWeight:700}}> 牽制</span>
            : <>
              <PitchDot ptId={cur.pt} size={22}/>
              <span style={{fontSize:15,fontWeight:700,color:ptInfo?.color}}>{ptInfo?.label}</span>
              {cur.speed&&<span style={{fontSize:13,fontWeight:700,color:'#c084fc'}}>{cur.speed}km/h</span>}
              <span style={{flex:1}}/>
              <span style={{fontSize:13,fontWeight:700,
                color:getResultColor(cur.result)}}>{resInfo?.label}</span>
            </>}
        </div>
        {!cur.isPickoff&&(
          <ZoneChart value={cur.zone} batterHand={cur.bh||'R'} atBatPitches={atBatPs}/>
        )}
      </div>

      {/* コントロール */}
      <div className="card" style={{marginBottom:8}}>
        <div style={{display:'flex',gap:6,marginBottom:8}}>
          <button className="btn btn-secondary"
            style={{flex:1,padding:'8px',fontSize:14}}
            onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0}>⏮ 前</button>
          <button className="btn btn-primary"
            style={{flex:2,padding:'10px',fontSize:14,fontWeight:800}}
            onClick={()=>setPlaying(p=>!p)}>
            {playing?'⏸ 停止':'▶ 再生'}
          </button>
          <button className="btn btn-secondary"
            style={{flex:1,padding:'8px',fontSize:14}}
            onClick={()=>setIdx(i=>Math.min(sorted.length-1,i+1))} disabled={idx===sorted.length-1}>次 ⏭</button>
        </div>
        <input type="range" min={0} max={sorted.length-1} value={idx}
          onChange={e=>setIdx(+e.target.value)}
          style={{width:'100%',accentColor:'#3b82f6'}}/>
        <div style={{display:'flex',gap:4,justifyContent:'center',marginTop:8}}>
          <span style={{fontSize:10,color:'#64748b',alignSelf:'center'}}>再生速度:</span>
          {[2500,1500,800,400].map(s=>(
            <button key={s} onClick={()=>setSpeed(s)}
              style={{padding:'3px 8px',borderRadius:5,
                border:`1px solid ${speed===s?'#3b82f6':'#334155'}`,
                background:speed===s?'#1d4ed8':'transparent',
                color:speed===s?'#fff':'#94a3b8',
                fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
              {s===2500?'×0.5':s===1500?'×1':s===800?'×2':'×4'}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── スマホ起動ガイドモーダル ──
function MobileSetupModal({onClose}){
  // OSざっくり判定
  const ua=typeof navigator!=='undefined'?navigator.userAgent:'';
  const isIOS=/iPhone|iPad|iPod/.test(ua);
  const isAndroid=/Android/.test(ua);
  const url=typeof window!=='undefined'?window.location.href:'';
  const isFile=/^file:/.test(url);
  const isStandalone=typeof window!=='undefined'&&window.__isStandalone?.();

  const Step=({n,title,body,icon})=>(
    <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'flex-start'}}>
      <div style={{width:28,height:28,borderRadius:'50%',background:'#3b82f6',
        color:'#fff',fontSize:14,fontWeight:900,display:'flex',
        alignItems:'center',justifyContent:'center',flexShrink:0}}>{n}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0',marginBottom:3}}>
          {icon} {title}
        </div>
        <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6,whiteSpace:'pre-line'}}>{body}</div>
      </div>
    </div>
  );

  const copyURL=async()=>{
    try{await navigator.clipboard.writeText(url);alert('URLをコピーしました');}
    catch{prompt('このURLをコピー:',url);}
  };

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:440,maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <h3 style={{fontSize:17}}> スマホで使う</h3>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>

        {isStandalone&&(
          <div style={{padding:8,background:'rgba(34,197,94,.15)',borderRadius:6,
            marginBottom:10,fontSize:12,color:'#86efac',textAlign:'center'}}>
            ✓ すでにアプリとしてホーム画面から起動中です

        {isFile&&(
          <div style={{padding:8,background:'rgba(239,68,68,.12)',borderRadius:6,
            marginBottom:10,fontSize:12,color:'#fca5a5',border:'1px solid rgba(239,68,68,.3)'}}>
             <strong>ファイルから直接開いています</strong>。<br/>
            この状態ではホーム画面追加が制限される場合があります。下の「方法B/C」を推奨します。
          </div>
        )}

        {/* 現在のURL表示 */}
        <div style={{padding:8,background:'#0f172a',borderRadius:6,marginBottom:14,
          border:'1px solid #334155'}}>
          <div style={{fontSize:10,color:'#94a3b8',marginBottom:4}}>現在のURL</div>
          <div style={{fontSize:11,color:'#cbd5e1',wordBreak:'break-all',
            fontFamily:'monospace',marginBottom:6,maxHeight:60,overflow:'auto'}}>
            {url}
          </div>
          <button onClick={copyURL} className="btn btn-secondary btn-sm"
            style={{width:'100%',fontSize:11,padding:'5px'}}> URLをコピー</button>
        </div>

        {/* iOS手順 */}
        {(isIOS||!isAndroid)&&(
          <div style={{marginBottom:18}}>
            <div style={{fontSize:14,fontWeight:800,color:'#60a5fa',marginBottom:10,
              padding:'5px 8px',background:'rgba(59,130,246,.1)',borderRadius:5}}>
               iPhone / iPad の手順
            </div>
            <Step n={1} icon="" title="Safariで開く"
              body={' 必ず Safari ブラウザで開いてください。\nChromeやLINE内ブラウザでは「ホーム画面追加」が機能しません。\n\nLINEなどでURLを受け取った場合: メッセージのURLを長押し→「Safariで開く」'}/>
            <Step n={2} icon="" title="共有ボタン → ホーム画面に追加"
              body={'画面下部の共有ボタン (□に↑のアイコン) をタップ。\nスクロールして「ホーム画面に追加」を選択。\n名前を確認して「追加」をタップ。'}/>
            <Step n={3} icon="✓" title="ホーム画面のアイコンから起動"
              body={'これで通常のアプリ同じくフルスクリーンで起動できます。\nオフラインでも記録可能（IndexedDB保存）。'}/>
          </div>
        )}

        {/* Android手順 */}
        {(isAndroid||!isIOS)&&(
          <div style={{marginBottom:18}}>
            <div style={{fontSize:14,fontWeight:800,color:'#4ade80',marginBottom:10,
              padding:'5px 8px',background:'rgba(34,197,94,.1)',borderRadius:5}}>

            <Step n={2} icon="⋮" title="メニュー → ホーム画面に追加"
              body={'右上の ⋮ メニュー → 「ホーム画面に追加」または「アプリをインストール」をタップ。'}/>
            <Step n={3} icon="✓" title="ホーム画面のアイコンから起動"
              body={'インストール完了後はアプリとして単独で起動します。'}/>
          </div>
        )}

        {/* ホスティング案内 */}
        <div style={{marginTop:18,padding:10,background:'#1e293b',borderRadius:8,
          border:'1px solid #334155'}}>
          <div style={{fontSize:12,fontWeight:700,color:'#cbd5e1',marginBottom:8}}>
             もっと簡単にチーム全員へ配るには
          </div>
          <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6}}>

                style={{color:'#93c5fd'}}>Netlify Drop</a> へこのHTMLをドラッグするだけ。
              数秒でURLが発行され、そのURLをLINEで全員に送信できます。
            </div>
            <div style={{marginBottom:8}}>
              <strong style={{color:'#60a5fa'}}>方法C: クラウドストレージ</strong><br/>
              Google Drive / iCloud Drive にHTMLを保存し、共有リンクを送る。
              受け取った人はリンクを開く → Safariで開く → 上の手順でホーム追加。
            </div>
            <div style={{padding:6,background:'#0f172a',borderRadius:4,fontSize:10}}>
              <strong>注:</strong> 方法B/Cなら「クラウド同期(Firebase)」も問題なく動作します。
              ファイル直接共有(file://)の場合、一部機能が制限されます。
            </div>
          </div>
        </div>

        <button className="btn btn-primary" style={{width:'100%',marginTop:14,padding:'10px'}}
          onClick={onClose}>OK / 閉じる</button>
      </div>
    </div>
  );
}

          <div style={{fontSize:12,fontWeight:700,color:'#64748b',textTransform:'uppercase',
            letterSpacing:'1px',marginBottom:10}}>過去の試合</div>
          {games.map(g=>{
            const away=(g.gs?.score?.away||0)+(g.gs?.scoreAdj?.away||0);
            const home=(g.gs?.score?.home||0)+(g.gs?.scoreAdj?.home||0);
            const deleteGame=async(e)=>{
              e.stopPropagation();
              if(!confirm(`「${g.name||'名称未設定'}」を削除しますか？\n\n投球データ・スタメン情報も全て削除されます。\nこの操作は取り消せません。`)) return;
              try{
                // 関連投球データを全削除
                const ps=await dbGetByIdx('pitches','gid',g.id);
                for(const p of ps) await dbDel('pitches',p.id);
                // 試合データ削除
                await dbDel('games',g.id);
                setGames(prev=>prev.filter(x=>x.id!==g.id));
              }catch(err){
                alert('削除エラー: '+err.message);
              }
            };
            return (
              <div key={g.id} className="card" style={{marginBottom:8,cursor:'pointer',
                border:`1px solid ${g.endedAt?'rgba(34,197,94,.4)':'#334155'}`,
                transition:'border-color .15s',
                background:g.endedAt?'rgba(34,197,94,.04)':undefined}}
                onClick={()=>onSelect(g.id)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                      display:'flex',alignItems:'center',gap:6}}>
                      {g.endedAt&&<span style={{fontSize:9,padding:'1px 6px',borderRadius:8,
                        background:'rgba(34,197,94,.2)',color:'#4ade80',fontWeight:800,flexShrink:0}}>終了</span>}
                      <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.name||'名称未設定'}</span>
                    </div>
                    <div style={{fontSize:12,color:'#64748b',marginTop:3}}>
                      {g.date||''}{g.stadium?` ${g.stadium}`:''}{g.battingFirst?` / 先攻:${g.battingFirst}`:''}
                    </div>
                  </div>
                  <div style={{textAlign:'right',marginLeft:8,flexShrink:0}}>
                    <div style={{fontSize:18,fontWeight:800,color:'#e2e8f0'}}>{away} - {home}</div>
                    <div style={{fontSize:11,color:'#64748b'}}>{g.gs?.pitchCount||0}球 / {g.gs?.inning||1}回{g.gs?.topBottom==='top'?'表':'裏'}</div>
                  </div>
                  <button onClick={deleteGame}
                    title="削除"
                    style={{marginLeft:8,padding:'8px 10px',borderRadius:8,
                      background:'transparent',border:'1px solid #64748b',
                      color:'#94a3b8',fontSize:14,cursor:'pointer',
                      fontFamily:'inherit',flexShrink:0,
                      transition:'all .15s'}}
                    onMouseEnter={e=>{
                      e.currentTarget.style.background='rgba(239,68,68,.15)';
                      e.currentTarget.style.borderColor='#ef4444';
                      e.currentTarget.style.color='#fca5a5';
                    }}
                    onMouseLeave={e=>{
                      e.currentTarget.style.background='transparent';
                      e.currentTarget.style.borderColor='#64748b';
                      e.currentTarget.style.color='#94a3b8';
                    }}>
                    削除
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {!loading&&games.length===0&&(
        <div style={{textAlign:'center',color:'#334155',marginTop:20,fontSize:13}}>
          まだ試合の記録がありません
        </div>
      )}
    </div>
  );
}

// ── スタメン入力サブコンポーネント（先攻・後攻共用）──
function LineupForm({teamLabel,teamColor,lineup,setLineup,pitcher,setPitcher}){
  const upd=(i,k,v)=>setLineup(l=>{const n=[...l];n[i]={...n[i],[k]:v};return n;});
  return (
    <div>
      {/* ピッチャー */}
      <div className="card" style={{marginBottom:10,borderLeft:`3px solid ${teamColor}`}}>
        <div style={{fontSize:13,fontWeight:700,color:teamColor,marginBottom:8}}>
           {teamLabel} 投手（先発ピッチャー）
        </div>
        {/* 1行目: 背番号/名前/左右 */}
        <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:6}}>
          <input value={pitcher.number}
            onChange={e=>setPitcher(p=>({...p,number:e.target.value}))}
            placeholder="#" style={{width:44,fontSize:12,padding:'6px 7px',flexShrink:0}}/>
          <input value={pitcher.name}
            onChange={e=>setPitcher(p=>({...p,name:e.target.value}))}
            placeholder="名前（投手）" style={{flex:1,fontSize:12,padding:'6px 8px'}}/>
          <select value={pitcher.hand}
            onChange={e=>setPitcher(p=>({...p,hand:e.target.value}))}
            style={{width:50,fontSize:12,padding:'6px 3px',flexShrink:0}}>
            <option value="R">右投</option>
            <option value="L">左投</option>
          </select>
        </div>
        {/* ① 2行目: 投球フォーム / プレート位置 */}
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <span style={{fontSize:10,color:'#64748b',width:44,flexShrink:0,textAlign:'right',paddingRight:4}}>
            投げ方
          </span>
          <select value={pitcher.arm||'three'}
            onChange={e=>setPitcher(p=>({...p,arm:e.target.value}))}
            style={{flex:1,fontSize:11,padding:'5px 4px'}}>
            {PITCHER_ARMS.map(a=><option key={a.v} value={a.v}>{a.l}</option>)}
          </select>
          <span style={{fontSize:10,color:'#64748b',flexShrink:0,paddingLeft:4}}>プレート</span>
          <select value={pitcher.plate||'center'}
            onChange={e=>setPitcher(p=>({...p,plate:e.target.value}))}
            style={{width:70,fontSize:11,padding:'5px 4px',flexShrink:0}}>
            {PITCHER_PLATES.map(p=><option key={p.v} value={p.v}>{p.l}</option>)}
          </select>
        </div>
      </div>

      {/* 打順 1-9 */}
      <div className="card" style={{borderLeft:`3px solid ${teamColor}`}}>
        <div style={{fontSize:13,fontWeight:700,color:'#94a3b8',marginBottom:6}}>
          {teamLabel} 打順・スタメン
        </div>
        {/* 列ヘッダー */}
        <div style={{display:'grid',gridTemplateColumns:'16px 44px 1fr 40px 34px',
          gap:4,fontSize:10,color:'#64748b',marginBottom:5,paddingLeft:2}}>
          <span>#</span><span>背番</span><span>名前</span><span>守備</span><span>打席</span>
        </div>
        {lineup.map((p,i)=>(
          <div key={i} style={{display:'flex',gap:4,marginBottom:5,alignItems:'center'}}>
            <span style={{width:16,textAlign:'center',fontSize:12,color:teamColor,
              fontWeight:800,flexShrink:0}}>{p.order}</span>
            <input value={p.number} onChange={e=>upd(i,'number',e.target.value)}
              placeholder="#" style={{width:44,fontSize:11,padding:'5px 5px',flexShrink:0}}/>
            <input value={p.name} onChange={e=>upd(i,'name',e.target.value)}
              placeholder={`${p.order}番`} style={{flex:1,fontSize:11,padding:'5px 7px',minWidth:0}}/>
            <select value={p.pos} onChange={e=>upd(i,'pos',e.target.value)}
              style={{width:40,fontSize:10,padding:'5px 2px',flexShrink:0}}>
              {POSITIONS.map((pos,pi)=>(
                <option key={pos} value={pos}>{POS_SHORT[pi]}</option>
              ))}
            </select>
            <select value={p.hand} onChange={e=>upd(i,'hand',e.target.value)}
              style={{width:34,fontSize:10,padding:'5px 2px',flexShrink:0}}>
              <option value="R">右</option>
              <option value="L">左</option>
              <option value="S">両</option>
            </select>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Game Setup Screen (画面B) ──
// 新規作成（確定）・既存編集（変更を確定）の両方に対応
// 先攻・後攻それぞれ独立したスタメン入力対応
function GameSetupScreen({existingGame, onConfirm, onBack}){
  const isEdit=!!existingGame;

  // ── 試合情報 ──
  const [info,setInfo]=useState({
    name: existingGame?.name || '',
    date: existingGame?.date || new Date().toISOString().slice(0,10),
    stadium: existingGame?.stadium || '',
    teamAway: existingGame?.teamAway || '', // 先攻チーム名
    teamHome: existingGame?.teamHome || '', // 後攻チーム名
  });
  const updInfo=(k,v)=>setInfo(f=>({...f,[k]:v}));

  // ── スタメン: 先攻チーム（Away = 表の攻撃）──
  const mkLineup=()=>Array.from({length:9},(_,i)=>({
    order:i+1, number:'', name:'', pos:POSITIONS[i]||'投手', hand:'R'
  }));
  const [lineupAway,setLineupAway]=useState(()=>{
    if(existingGame?.lineupAway?.length===9) return existingGame.lineupAway.map(p=>({...p}));
    return mkLineup();
  });
  const [pitcherAway,setPitcherAway]=useState(
    ()=>existingGame?.pitcherAway||{number:'',name:'',hand:'R',arm:'three',plate:'center'}
  );

  // ── スタメン: 後攻チーム（Home = 裏の攻撃）──
  const [lineupHome,setLineupHome]=useState(()=>{
    if(existingGame?.lineupHome?.length===9) return existingGame.lineupHome.map(p=>({...p}));
    return mkLineup();
  });
  const [pitcherHome,setPitcherHome]=useState(
    ()=>existingGame?.pitcherHome||{number:'',name:'',hand:'R',arm:'three',plate:'center'}
  );

  const [tab,setTab]=useState('info'); // 'info' | 'away' | 'home'
  const [errors,setErrors]=useState([]);

  const validate=()=>{
    const e=[];
    if(!info.date) e.push('試合日を入力してください');
    if(!info.teamAway&&!info.teamHome) e.push('チーム名を少なくとも1つ入力してください');
    setErrors(e);
    return e.length===0;
  };

  const handleConfirm=async()=>{
    if(!validate()) return;
    const gs=existingGame?.gs||{
      count:{balls:0,strikes:0}, outs:0,
      runners:{first:false,second:false,third:false},
      score:{home:0,away:0}, scoreAdj:{home:0,away:0},
      inning:1, topBottom:'top', pitchCount:0,
      currentAtBat:genId(), currentBatterOrder:1,
    };
    const id=existingGame?.id||genId();
    const gameData={
      id, ...info,
      gs,
      // 先攻チーム（Away）スタメン
      lineupAway, pitcherAway,
      // 後攻チーム（Home）スタメン
      lineupHome, pitcherHome,
      // 後方互換: lineupは現在の攻撃チームを参照（InputScreenで動的切替）
      lineup: lineupAway,
      subs: existingGame?.subs||[],
      createdAt: existingGame?.createdAt||Date.now(),
      updatedAt: Date.now(),
    };
    await dbPut('games',gameData);
    onConfirm(id);
  };

  // チームカラー
  const AWAY_COLOR='#f97316'; // 先攻: オレンジ
  const HOME_COLOR='#3b82f6'; // 後攻: ブルー

  return (
    <div className="screen">
      {/* ヘッダー */}
      <div className="header">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← 戻る</button>
        <h2 style={{fontSize:16}}>{isEdit?'試合情報を編集':'新規試合作成'}</h2>
      </div>

      {/* タブ: 試合情報 / 先攻スタメン / 後攻スタメン */}
      <div className="tab-bar" style={{marginBottom:12}}>
        <button className={`tab ${tab==='info'?'active':''}`} onClick={()=>setTab('info')}>
           試合情報
        </button>
        <button className={`tab ${tab==='away'?'active':''}`}
          style={{color:tab==='away'?undefined:AWAY_COLOR,borderBottom:tab==='away'?undefined:`2px solid ${AWAY_COLOR}`}}
          onClick={()=>setTab('away')}>
          先攻スタメン
        </button>
        <button className={`tab ${tab==='home'?'active':''}`}
          style={{color:tab==='home'?undefined:HOME_COLOR,borderBottom:tab==='home'?undefined:`2px solid ${HOME_COLOR}`}}
          onClick={()=>setTab('home')}>
          後攻スタメン
        </button>
      </div>

      {/* ── タブ: 試合情報 ── */}
      {tab==='info'&&(
        <div className="card" style={{marginBottom:12}}>
          <div style={{marginBottom:14}}>
            <div style={labelStyle}>試合名（任意）</div>
            <input value={info.name} placeholder="例: 春季大会 準決勝"
              onChange={e=>updInfo('name',e.target.value)}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={labelStyle}>試合日 <span style={{color:'#ef4444'}}>*</span></div>
            <input type="date" value={info.date} onChange={e=>updInfo('date',e.target.value)}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={labelStyle}>球場</div>
            <input value={info.stadium} placeholder="例: 甲子園球場"
              onChange={e=>updInfo('stadium',e.target.value)}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:AWAY_COLOR,flexShrink:0,display:'inline-block'}}/>
              <div style={labelStyle}>先攻チーム名 <span style={{color:'#ef4444'}}>*</span></div>
            </div>
            <input value={info.teamAway} placeholder="例: ○○高校（先攻）"
              onChange={e=>updInfo('teamAway',e.target.value)}
              style={{borderColor:AWAY_COLOR+'66'}}/>
          </div>
          <div style={{marginBottom:6}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:HOME_COLOR,flexShrink:0,display:'inline-block'}}/>
              <div style={labelStyle}>後攻チーム名 <span style={{color:'#ef4444'}}>*</span></div>
            </div>
            <input value={info.teamHome} placeholder="例: △△高校（後攻）"
              onChange={e=>updInfo('teamHome',e.target.value)}
              style={{borderColor:HOME_COLOR+'66'}}/>
          </div>
          {errors.length>0&&(
            <div style={{marginTop:12,padding:'10px 12px',background:'rgba(239,68,68,.12)',
              borderRadius:8,border:'1px solid #ef4444'}}>
              {errors.map((e,i)=><div key={i} style={{fontSize:12,color:'#ef4444'}}>{e}</div>)}
            </div>
          )}
          {/* スタメン入力への案内 */}
          <div style={{marginTop:14,display:'flex',gap:8}}>
            <button className="btn btn-secondary" style={{flex:1,fontSize:12,padding:'8px'}}
              onClick={()=>setTab('away')}>
              <span style={{color:AWAY_COLOR}}>先攻スタメン入力 →</span>
            </button>
            <button className="btn btn-secondary" style={{flex:1,fontSize:12,padding:'8px'}}
              onClick={()=>setTab('home')}>
              <span style={{color:HOME_COLOR}}>後攻スタメン入力 →</span>
            </button>
          </div>
        </div>
      )}

      {/* ── タブ: 先攻スタメン ── */}
      {tab==='away'&&(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:AWAY_COLOR,marginBottom:8,
            padding:'6px 10px',background:'rgba(249,115,22,.08)',borderRadius:8}}>
             先攻: {info.teamAway||'先攻チーム'}
          </div>
          <LineupForm
            teamLabel={info.teamAway||'先攻'}
            teamColor={AWAY_COLOR}
            lineup={lineupAway}
            setLineup={setLineupAway}
            pitcher={pitcherAway}
            setPitcher={setPitcherAway}
          />
        </div>
      )}

      {/* ── タブ: 後攻スタメン ── */}
      {tab==='home'&&(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:HOME_COLOR,marginBottom:8,
            padding:'6px 10px',background:'rgba(59,130,246,.08)',borderRadius:8}}>
             後攻: {info.teamHome||'後攻チーム'}
          </div>
          <LineupForm
            teamLabel={info.teamHome||'後攻'}
            teamColor={HOME_COLOR}
            lineup={lineupHome}
            setLineup={setLineupHome}
            pitcher={pitcherHome}
            setPitcher={setPitcherHome}
          />
        </div>
      )}

      {/* ── ボタンエリア ── */}
      <div style={{marginTop:16,display:'flex',gap:8,flexDirection:'column'}}>
        {isEdit?(
          <button className="btn btn-success"
            style={{width:'100%',padding:'15px',fontSize:16,fontWeight:800,borderRadius:12}}
            onClick={handleConfirm}>
            ✓ &nbsp;変更を確定
          </button>
        ):(
          <button className="btn btn-primary"
            style={{width:'100%',padding:'15px',fontSize:16,fontWeight:800,borderRadius:12}}
            onClick={handleConfirm}>
            確定して配球入力へ →
          </button>
        )}
        <button className="btn btn-secondary" style={{width:'100%'}} onClick={onBack}>
          キャンセル
        </button>
      </div>
    </div>
  );
}

const labelStyle={fontSize:12,color:'#94a3b8',marginBottom:5,fontWeight:600};

// ── App ──
function App(){
  const [screen,setScreen]=useState('home');
  const [gameId,setGameId]=useState(null);
  const [game,setGame]=useState(null);
  const [pitches,setPitches]=useState([]);
  const [gs,setGsRaw]=useState(null);

  const setGs=useCallback(newGs=>{
    setGsRaw(newGs);
    setGame(g=>g?{...g,gs:newGs}:g);
  },[]);

  const refreshPitches=useCallback(async()=>{
    if(gameId){
      const ps=await dbGetByIdx('pitches','gid',gameId);
      setPitches(ps);
    }
  },[gameId]);


  const loadGame=useCallback(async id=>{
    const games=await dbGetAll('games');
    const g=games.find(x=>x.id===id);
    if(!g)return;
    const ps=await dbGetByIdx('pitches','gid',id);
    setGame(g);setGsRaw(g.gs);setPitches(ps);setGameId(id);
    setScreen('input');
  },[]);

  const nav=dest=>{
    if(dest==='home'){setScreen('home');setGame(null);setGameId(null);setGsRaw(null);}
    else setScreen(dest);
  };

  if(screen==='home')
    return <HomeScreen onSelect={loadGame} onCreate={()=>setScreen('create')}/>;

  if(screen==='create')
    return <GameSetupScreen
      existingGame={null}
      onConfirm={loadGame}
      onBack={()=>setScreen('home')}
    />;

  if(screen==='edit'&&game)
    return <GameSetupScreen
      existingGame={game}
      onConfirm={async id=>{
        // 変更を確定後、試合情報を再読み込みしてinputへ
        const games=await dbGetAll('games');
        const g=games.find(x=>x.id===id);
        if(g){setGame(g);setGsRaw(g.gs);}
        setScreen('input');
      }}
      onBack={()=>setScreen('input')}
    />;

  if(!game||!gs)
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',
      height:'100vh',fontSize:16,color:'#64748b'}}>読み込み中...</div>;

  if(screen==='input')
    return <InputScreen game={game} pitches={pitches} gs={gs} setGs={setGs}
      onNav={nav} refreshPitches={refreshPitches} onGameUpdate={setGame}/>;
  if(screen==='lineup')
    return <LineupScreen game={game} onBack={()=>setScreen('input')}/>;
  if(screen==='analysis')
    return <AnalysisScreen game={game} pitches={pitches} onBack={()=>setScreen('input')}/>;
  if(screen==='history')
    return <HistoryScreen pitches={pitches} onBack={()=>setScreen('input')}
      onPitchEdit={async updated=>{await dbPut('pitches',updated);refreshPitches();}}/>;
  if(screen==='share')
    return <ShareScreen game={game} pitches={pitches} onBack={()=>setScreen('input')}/>;
  if(screen==='replay')
    return <ReplayScreen game={game} pitches={pitches} onBack={()=>setScreen('input')}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
